runtime:
  dtype: float64
  device: cpu
  seed: 0

system:
  name: hooke_pair_singlet
  n_particles: 2
  spatial_dim: 3
  omega: 0.5
  exact_energy: 2.0

wavefunction:
  _target_: spenn.physics.hooke.HookeSingletExact

hamiltonian_terms:
  - _target_: spenn.physics.kinetic.KineticEnergy

  - _target_: spenn.physics.potential.HarmonicTrap
    omega: ${system.omega}

  - _target_: spenn.physics.potential.ElectronElectronInteraction

test_batch:
  batch_size: 64
  min_pair_distance: 0.1
  seed: ${runtime.seed}

validation:
  energy_atol: 1.0e-5
  energy_rtol: 1.0e-5
  variance_atol: 1.0e-8
