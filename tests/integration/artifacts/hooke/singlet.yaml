experiment_name: hooke_exact_singlet_integration
run_mode: integration
sector: singlet
run_id: null
seed: 3
dtype: float64
device: cpu
output_root: outputs/integration_tests

run:
  mode: evaluate
  name: hooke_${sector}
  id: ${run_id}
  output_root: ${output_root}
  id_prefix: hooke_exact_${sector}
  energy_prefix: energy

system:
  _target_: spenn.physics.systems.ElectronicSystem
  name: hooke_singlet
  n_electrons: 2
  spatial_dim: 3
  harmonic_omega: 0.5
  include_electron_electron: true
  n_up: 1
  n_down: 1
  exact_energy: 2.0
  dtype: ${dtype}
  aux:
    sector: singlet
    cusp_slope: 0.5

model:
  _target_: experiments.hooke.analytic.HookeExactWavefunction
  sector: ${sector}
  node_axis: 2

hamiltonian:
  _target_: spenn.physics.hamiltonian.ElectronicHamiltonian
  name: electronic
  kinetic:
    _target_: spenn.physics.kinetic.LogAbsKineticEnergy
  potential:
    _target_: spenn.physics.potential.ElectronicPotential
    eps: 1.0e-12

sampler:
  _target_: spenn.sampling.metropolis.MetropolisSampler
  name: metropolis
  move:
    _target_: spenn.sampling.moves.GaussianMove
    step_size: 0.9
    move_all: true
  n_walkers: 16
  warmup_steps: 4
  production_blocks: 2
  steps_per_block: 2
  steps_per_iter: 2
  initial_scale: 1.4
  dtype: ${dtype}

diagnostics:
  local_energy_histogram:
    _target_: spenn.diagnostics.HistogramDiagnostic
    values: local_energy
    bins: 8
    table_name: local_energy_histogram
  r12_histogram:
    _target_: spenn.diagnostics.HistogramDiagnostic
    values: r12
    bins: 8
    table_name: r12_histogram
  cusp:
    _target_: spenn.diagnostics.CuspSlopeDiagnostic
    sector: ${sector}
    node_axis: ${model.node_axis}
    n_points: 8
    metric_prefix: cusp
    value_column: factored_logabs
    table_name: cusp_diagnostic_plot
  radial:
    _target_: spenn.diagnostics.RadialCutDiagnostic
    sector: ${sector}
    node_axis: ${model.node_axis}
    n_points: 12
    table_name: wavefunction_radial_cut
  exchange:
    _target_: spenn.diagnostics.ExchangeSymmetryDiagnostic
    sector: ${sector}
    exchange_mode: spatial_singlet
    node_axis: ${model.node_axis}
    n_samples: 16
    metric_prefix: symmetry

artifacts:
  write_plot_data: false
  write_checkpoint: true

validation:
  preflight_energy_tolerance: 1.0e-8
  sample_energy_tolerance: 1.0e-7
  exchange_error_tolerance: 1.0e-8
  sign_match_min: 1.0

tracking:
  tags:
    - integration_test
    - hooke
    - singlet
    - opposite_spin
    - analytic_cusp
    - exact_wavefunction
    - metropolis
