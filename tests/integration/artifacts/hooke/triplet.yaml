experiment_name: hooke_exact_triplet_integration
run_mode: integration
sector: triplet
run_id: null
seed: 3
dtype: float64
device: cpu
output_root: outputs/integration_tests

system:
  name: hooke_triplet
  n_electrons: 2
  spatial_dim: 3
  harmonic_omega: 0.25
  exact_energy: 1.25

model:
  _target_: experiments.hooke.analytic.HookeExactWavefunction
  sector: triplet
  node_axis: 2
  cusp: analytic
  readout: analytic_antisymmetric_z

sampler:
  name: metropolis
  n_walkers: 16
  warmup_steps: 4
  production_blocks: 2
  steps_per_block: 2
  step_size: 1.1
  move_all: true
  initial_scale: 2.0

diagnostics:
  cusp_points: 8
  radial_points: 12
  histogram_bins: 8
  symmetry_samples: 16

artifacts:
  write_plot_data: false

validation:
  preflight_energy_tolerance: 1.0e-8
  sample_energy_tolerance: 1.0e-7

tracking:
  tags:
    - integration_test
    - hooke
    - triplet
    - same_spin
    - analytic_cusp
    - exact_wavefunction
    - metropolis
