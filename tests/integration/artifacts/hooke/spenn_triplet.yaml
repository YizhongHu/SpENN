experiment_name: hooke_spenn_triplet_integration
run_mode: integration
sector: triplet
run_id: pytest_hooke_spenn_triplet
seed: 3
dtype: float64
device: cpu
output_root: outputs/integration_tests

system:
  name: hooke_triplet
  n_electrons: 2
  spatial_dim: 3
  harmonic_omega: 0.25
  exact_energy: 1.25

model:
  _target_: spenn.nn.wavefunction.SpENNWavefunction
  encoder:
    _target_: spenn.nn.encoding.electron_features.ElectronPairEncoder
    name: hooke_triplet_tiny
    max_order: 2
    channels: [0, 2, 2]
    hidden_channels: 4
    num_hidden_layers: 0
    activation:
      _target_: torch.nn.Tanh
    include_spins: true
  spechtmp:
    _target_: spenn.nn.spechtmp.layer.SpechtMP
    layers:
      - _target_: spenn.nn.spechtmp.layer.SpechtMPLayer
        fusion_map:
          _target_: spenn.reps.fusion.FusionMap
          M: 2
          M_virtual: 2
        message_head:
          _target_: spenn.nn.spechtmp.message_head.MessageHead
          M: 2
          M_virtual: 2
          channels: [0, 2, 2]
          include_linear: true
          activation:
            _target_: spenn.nn.activations.ActivationByType
            symmetric:
              _target_: spenn.nn.activations.ElementwiseFeatureActivation
              activation:
                _target_: torch.nn.Sigmoid
            antisymmetric:
              _target_: spenn.nn.activations.ElementwiseFeatureActivation
              activation:
                _target_: torch.nn.Tanh
            tensor:
              _target_: spenn.nn.activations.NormGateActivation
              activation:
                _target_: torch.nn.Sigmoid
              eps: 1.0e-12
        branch_map:
          _target_: spenn.reps.branch.BranchMap
          M: 2
          M_virtual: 2
        update_head:
          _target_: spenn.nn.spechtmp.update_head.UpdateHead
          M: 2
          channels: [0, 2, 2]
        update:
          _target_: spenn.nn.update.ResidualUpdate
  readout:
    _target_: spenn.nn.readout.node.TwoElectronTripletNodeReadout
    node_axis: 2
    eps: 1.0e-12
    envelope_coefficient: 0.125
    trainable_envelope: false
    zero_init_residual: true
  cusp:
    _target_: spenn.nn.cusp.ElectronElectronCusp
    enabled: true
    same_spin_coefficient: 0.25
    opposite_spin_coefficient: 0.5
    range_parameter: 1.0
    trainable_range: false

hamiltonian:
  _target_: spenn.physics.hamiltonian.ElectronicHamiltonian
  name: electronic
  kinetic:
    _target_: spenn.physics.kinetic.LogAbsKineticEnergy
  potential:
    _target_: spenn.physics.potential.ElectronicPotential
    eps: 1.0e-12

sampler:
  name: metropolis
  n_walkers: 8
  warmup_steps: 2
  production_blocks: 1
  steps_per_block: 1
  steps_per_iter: 1
  step_size: 0.8
  move_all: true
  initial_scale: 2.0

loss:
  _target_: spenn.losses.vmc.VMCLoss

optimizer:
  _target_: torch.optim.Adam
  lr: 1.0e-3
  grad_clip: 10.0

trainer:
  _target_: spenn.training.trainer.VMCTrainer
  max_steps: 1
  log_every: 1
  checkpoint_every: 1

training:
  vmc_steps: 2
  log_every: 1

diagnostics:
  comparison_points: 8
  cusp_points: 6
  radial_points: 8
  histogram_bins: 6
  symmetry_samples: 8

artifacts:
  write_plot_data: false

validation:
  preflight_energy_tolerance: 10.0
  sample_energy_tolerance: 10.0
  energy_tolerance: 10.0
  local_energy_variance_tolerance: 10.0
  radial_logabs_rmse_tolerance: 10.0
  cusp_slope_tolerance: 10.0
  exchange_error_tolerance: 1.0e-8
  sign_flip_min: 1.0
  sign_alignment_min: 1.0
  comparison_energy_abs_error_tolerance: 10.0
  comparison_logabs_mae_tolerance: 10.0

tracking:
  tags:
    - integration_test
    - hooke
    - spenn
    - triplet
    - same_spin
    - analytic_cusp
    - harmonic_envelope
    - vmc_only
    - explicit_triplet_node_readout
    - metropolis
