seed: 1234
dtype: float64
device: cuda

system:
  _target_: spenn.physics.systems.ElectronicSystem
  name: toy
  n_electrons: 2
  spatial_dim: 3
  harmonic_omega: 1.0
  dtype: ${dtype}

model:
  _target_: spenn.nn.wavefunction.SpENNWavefunction
  encoder:
    _target_: spenn.nn.encoding.electron_features.ElectronPairEncoder
    name: basic
    max_order: 2
    channels: [0, 32, 32]
    activation:
      _target_: torch.nn.Tanh
  spechtmp:
    _target_: spenn.nn.spechtmp.layer.SpechtMP
    layers:
      - _target_: spenn.nn.spechtmp.layer.SpechtMPLayer
        fusion_map:
          _target_: spenn.reps.fusion.FusionMap
          M: 2
          M_virtual: 2
        message_head:
          _target_: spenn.nn.spechtmp.message_head.MessageHead
          M: 2
          M_virtual: 2
          channels: [0, 32, 32]
          include_linear: true
          activation:
            _target_: spenn.nn.activations.ActivationByType
            symmetric:
              _target_: spenn.nn.activations.ElementwiseFeatureActivation
              activation:
                _target_: torch.nn.Sigmoid
            antisymmetric:
              _target_: spenn.nn.activations.ElementwiseFeatureActivation
              activation:
                _target_: torch.nn.Tanh
            tensor:
              _target_: spenn.nn.activations.NormGateActivation
              activation:
                _target_: torch.nn.Sigmoid
              eps: 1.0e-12
        branch_map:
          _target_: spenn.reps.branch.BranchMap
          M: 2
          M_virtual: 2
        update_head:
          _target_: spenn.nn.spechtmp.update_head.UpdateHead
          M: 2
          channels: [0, 32, 32]
        update:
          _target_: spenn.nn.update.ResidualUpdate
      - _target_: spenn.nn.spechtmp.layer.SpechtMPLayer
        fusion_map:
          _target_: spenn.reps.fusion.FusionMap
          M: 2
          M_virtual: 2
        message_head:
          _target_: spenn.nn.spechtmp.message_head.MessageHead
          M: 2
          M_virtual: 2
          channels: [0, 32, 32]
          include_linear: true
          activation:
            _target_: spenn.nn.activations.ActivationByType
            symmetric:
              _target_: spenn.nn.activations.ElementwiseFeatureActivation
              activation:
                _target_: torch.nn.Sigmoid
            antisymmetric:
              _target_: spenn.nn.activations.ElementwiseFeatureActivation
              activation:
                _target_: torch.nn.Tanh
            tensor:
              _target_: spenn.nn.activations.NormGateActivation
              activation:
                _target_: torch.nn.Sigmoid
              eps: 1.0e-12
        branch_map:
          _target_: spenn.reps.branch.BranchMap
          M: 2
          M_virtual: 2
        update_head:
          _target_: spenn.nn.spechtmp.update_head.UpdateHead
          M: 2
          channels: [0, 32, 32]
        update:
          _target_: spenn.nn.update.ResidualUpdate
      - _target_: spenn.nn.spechtmp.layer.SpechtMPLayer
        fusion_map:
          _target_: spenn.reps.fusion.FusionMap
          M: 2
          M_virtual: 2
        message_head:
          _target_: spenn.nn.spechtmp.message_head.MessageHead
          M: 2
          M_virtual: 2
          channels: [0, 32, 32]
          include_linear: true
          activation:
            _target_: spenn.nn.activations.ActivationByType
            symmetric:
              _target_: spenn.nn.activations.ElementwiseFeatureActivation
              activation:
                _target_: torch.nn.Sigmoid
            antisymmetric:
              _target_: spenn.nn.activations.ElementwiseFeatureActivation
              activation:
                _target_: torch.nn.Tanh
            tensor:
              _target_: spenn.nn.activations.NormGateActivation
              activation:
                _target_: torch.nn.Sigmoid
              eps: 1.0e-12
        branch_map:
          _target_: spenn.reps.branch.BranchMap
          M: 2
          M_virtual: 2
        update_head:
          _target_: spenn.nn.spechtmp.update_head.UpdateHead
          M: 2
          channels: [0, 32, 32]
        update:
          _target_: spenn.nn.update.ResidualUpdate
      - _target_: spenn.nn.spechtmp.layer.SpechtMPLayer
        fusion_map:
          _target_: spenn.reps.fusion.FusionMap
          M: 2
          M_virtual: 2
        message_head:
          _target_: spenn.nn.spechtmp.message_head.MessageHead
          M: 2
          M_virtual: 2
          channels: [0, 32, 32]
          include_linear: true
          activation:
            _target_: spenn.nn.activations.ActivationByType
            symmetric:
              _target_: spenn.nn.activations.ElementwiseFeatureActivation
              activation:
                _target_: torch.nn.Sigmoid
            antisymmetric:
              _target_: spenn.nn.activations.ElementwiseFeatureActivation
              activation:
                _target_: torch.nn.Tanh
            tensor:
              _target_: spenn.nn.activations.NormGateActivation
              activation:
                _target_: torch.nn.Sigmoid
              eps: 1.0e-12
        branch_map:
          _target_: spenn.reps.branch.BranchMap
          M: 2
          M_virtual: 2
        update_head:
          _target_: spenn.nn.spechtmp.update_head.UpdateHead
          M: 2
          channels: [0, 32, 32]
        update:
          _target_: spenn.nn.update.ResidualUpdate
  readout:
    _target_: spenn.nn.readout.pfaffian.PfaffianReadout
    name: pfaffian
    num_pfaffians: 1
    use_symmetric_gates: true
    allow_odd_electron_bordered: true
  cusp:
    _target_: spenn.nn.cusp.ElectronElectronCusp
    enabled: false

hamiltonian:
  _target_: spenn.physics.hamiltonian.ElectronicHamiltonian
  name: electronic
  kinetic:
    _target_: spenn.physics.kinetic.LogAbsKineticEnergy
  potential:
    _target_: spenn.physics.potential.ElectronicPotential
    eps: 1.0e-12

sampler:
  _target_: spenn.sampling.metropolis.MetropolisSampler
  name: metropolis
  move:
    _target_: spenn.sampling.moves.GaussianMove
    step_size: 0.05
    move_all: true
  n_walkers: 1024
  warmup_steps: 100
  steps_per_iter: 10
  initial_scale: 1.0

loss:
  _target_: spenn.losses.vmc.VMCLoss

optimizer:
  _target_: torch.optim.Adam
  lr: 0.0001

trainer:
  _target_: spenn.training.trainer.VMCTrainer
  max_steps: 1000
  log_every: 10
  checkpoint_every: 100
