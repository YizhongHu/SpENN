package: spenn

modes:
  tests: default
  entrypoints: opt_in
  training: opt_in_debug_only
  deployment: disabled

commands:
  tests: uv run pytest -q
  train_smoke: uv run python typechecked.py train.py -- --config=config.yaml training.vmc_steps=1 sampler.n_walkers=4 sampler.warmup_steps=1 sampler.production_blocks=1 sampler.steps_per_block=1 diagnostics.radial.n_points=8 diagnostics.cusp.n_points=4 diagnostics.exchange.n_samples=8 artifacts.write_checkpoint=false
  hooke_exact_debug: uv run python typechecked.py experiments/hooke/run_exact.py -- --config singlet --run-id typecheck_hooke_exact
  hooke_spenn_debug: uv run python typechecked.py experiments/hooke/run_spenn.py -- --config singlet_spenn --run-id typecheck_hooke_spenn training.vmc_steps=1 trainer.max_steps=1 sampler.n_walkers=4

notes:
  - Pytest installs the Typeguard import hook for the spenn package by default through pyproject.toml.
  - Runtime type checking for entrypoints remains opt-in through typechecked.py so production training stays fast.
