# =============================================================================
# Hooke pair-stability experiment grid (PR8.8)
# =============================================================================
#
# The grid is architecture x normalization x lr x channels x seed. The
# orchestrator translates each grid point into scalar Hydra-style overrides for
# the canonical run entrypoint (run.py). Every architecture key must exist in
# choices.architecture of pair_stability.yaml; raw_no_envelope and the other
# no-envelope variants are intentionally excluded from the main scan.
# =============================================================================

study: pair_stability
config: experiments/hooke/pair_stability/configs/pair_stability.yaml
validation_config: experiments/hooke/pair_stability/configs/pair_validation.yaml
results_root: experiments/hooke/pair_stability/results

grid:
  architecture:
    - raw_envelope
    - hermite_o2_envelope
    - hermite_o3_envelope
    # - orbital_s1_envelope
    # - orbital_s2_envelope

  normalization:
    - N0
    - N1
    - N2
    - N3
    - N4

  lr:
    - 3.0e-3
    - 1.0e-3
    - 3.0e-4
    - 1.0e-4

  channels:
    - 8
    - 16
    - 32

  seed:
    - 0
    - 1
    - 2
    # - 3
    # - 4
