# =============================================================================
# Hooke pair-stability V2 validation/evaluation base config (PR8.11)
# =============================================================================
#
# Restores a trained pair-stability checkpoint and runs the EvaluationTask-based
# physical-correctness suite (cusp, tail, stratified geometry, Hooke orbital)
# plus transform/trace stability tasks already implemented in the evaluation
# stack. Reference-energy comparisons are intentionally not part of this
# validation config.
# The basis/mechanism slots MUST match the trained run, so validation planning
# passes the same run_parameters used at training time.
#
#   uv run python run.py --config experiments/hooke/pair_stability_v3/configs/pair_validation.yaml \
#     run_parameters.basis_slot=B00 run_parameters.mechanism_slot=A03 \
#     run_parameters.lr=1.0e-3 run_parameters.channels=4 run_parameters.seed=0 \
#     load.path=<train_checkpoint> \
#     run.root=experiments/hooke/pair_stability_v3/results/02_validation \
#     run.layout=flat run.run_id=<run_id>/<attempt_id>
# =============================================================================

experiment:
  name: ${study.name}
  sector: pair
  run_name: ${study.name}_validation

study:
  name: pair_stability_v3
  stage: "02_validation"
  attempt_id: null
  config_id: null

run:
  root: experiments/hooke/pair_stability_v3/results/02_validation
  layout: flat
  run_id: null
  dir: null
  timezone: null  # launchers inject run.timezone

runtime:
  seed: ${run_parameters.seed}
  device: cuda
  dtype: float64

model_initialization:
  seed: ${runtime.seed}

terminal:
  enabled: true
  level: info
  color: auto
  rich: auto
  progress: false

system:
  name: hooke_pair
  n_particles: 2
  spatial_dim: 3
  omega: 0.5
  spin:
    n_up: 1
    n_down: 1

# Scalar run parameters; must match the trained run being evaluated.
run_parameters:
  basis_slot: raw_envelope
  mechanism_slot: baseline_silu
  lr: 1.0e-3
  channels: 4
  seed: 0

# Structured choice libraries (identical to pair_stability.yaml so the restored
# checkpoint maps onto the same basis and mechanism).
choices:
  basis:
    raw_envelope:
      basis:
        _target_: spenn.nn.RawCoordinateBasis
        spatial_dim: ${system.spatial_dim}
        include_spin: true
      tags: [main]
    orbital_s1_envelope:
      basis:
        _target_: spenn.nn.HookeOrbitalBasis
        omega: ${system.omega}
        max_shell: 1
        include_gaussian_factor: true
        spatial_dim: ${system.spatial_dim}
        include_spin: true
      tags: [main, orbital_with_envelope]
    orbital_s2_envelope:
      basis:
        _target_: spenn.nn.HookeOrbitalBasis
        omega: ${system.omega}
        max_shell: 2
        include_gaussian_factor: true
        spatial_dim: ${system.spatial_dim}
        include_spin: true
      tags: [main, orbital_with_envelope]
  mechanism:
    baseline_silu:
      embedding_activation: null
      feature_activation: null
      feature_envelope: null
      irrep_activation:
        _target_: spenn.nn.GatedNormActivation
        gate:
          _target_: torch.nn.SiLU
      update_activation: null
      update_envelope: null
      tags: [baseline]
    update_rms:
      embedding_activation: null
      feature_activation: null
      feature_envelope: null
      irrep_activation:
        _target_: spenn.nn.GatedNormActivation
        gate:
          _target_: torch.nn.SiLU
      update_activation:
        _target_: spenn.nn.RealRMSGate
        eps: 1.0e-8
      update_envelope: null
      tags: [update_scale, rms]
    update_gaussian_envelope:
      embedding_activation: null
      feature_activation: null
      feature_envelope: null
      irrep_activation:
        _target_: spenn.nn.GatedNormActivation
        gate:
          _target_: torch.nn.SiLU
      update_activation: null
      update_envelope:
        _target_: spenn.nn.RealCoordinateEnvelope
        envelope:
          _target_: spenn.nn.GaussianCoordinateEnvelope
          sigma: 1.0
      tags: [update_scale, coordinate_envelope]
    update_gaussian_norm:
      embedding_activation: null
      feature_activation: null
      feature_envelope: null
      irrep_activation:
        _target_: spenn.nn.GatedNormActivation
        gate:
          _target_: torch.nn.SiLU
      update_activation:
        _target_: spenn.nn.RealGaussianNormGate
        sigma: 1.0
      update_envelope: null
      tags: [update_scale, norm_gate]
    feature_rms:
      embedding_activation: null
      feature_activation:
        _target_: spenn.nn.RealRMSGate
        eps: 1.0e-8
      feature_envelope: null
      irrep_activation:
        _target_: spenn.nn.GatedNormActivation
        gate:
          _target_: torch.nn.SiLU
      update_activation: null
      update_envelope: null
      tags: [feature_scale, rms]
    feature_gaussian_envelope:
      embedding_activation: null
      feature_activation: null
      feature_envelope:
        _target_: spenn.nn.RealCoordinateEnvelope
        envelope:
          _target_: spenn.nn.GaussianCoordinateEnvelope
          sigma: 1.0
      irrep_activation:
        _target_: spenn.nn.GatedNormActivation
        gate:
          _target_: torch.nn.SiLU
      update_activation: null
      update_envelope: null
      tags: [feature_scale, coordinate_envelope]
    feature_gaussian_norm:
      embedding_activation: null
      feature_activation:
        _target_: spenn.nn.RealGaussianNormGate
        sigma: 1.0
      feature_envelope: null
      irrep_activation:
        _target_: spenn.nn.GatedNormActivation
        gate:
          _target_: torch.nn.SiLU
      update_activation: null
      update_envelope: null
      tags: [feature_scale, norm_gate]
    activation_sigmoid:
      embedding_activation: null
      feature_activation: null
      feature_envelope: null
      irrep_activation:
        _target_: spenn.nn.GatedNormActivation
        gate:
          _target_: spenn.nn.SigmoidGate
      update_activation: null
      update_envelope: null
      tags: [irrep_activation]
    activation_tanh:
      embedding_activation: null
      feature_activation: null
      feature_envelope: null
      irrep_activation:
        _target_: spenn.nn.GatedNormActivation
        gate:
          _target_: spenn.nn.TanhGate
      update_activation: null
      update_envelope: null
      tags: [irrep_activation]
    activation_gaussian:
      embedding_activation: null
      feature_activation: null
      feature_envelope: null
      irrep_activation:
        _target_: spenn.nn.GatedNormActivation
        gate:
          _target_: spenn.nn.GaussianDecayGate
          sigma: 1.0
      update_activation: null
      update_envelope: null
      tags: [irrep_activation, gaussian]

model_params:
  max_order: 2
  max_virtual_order: 2
  channels: ${run_parameters.channels}
  hidden_channels: 4
  num_hidden_layers: 1
  layers: 1
  mixing_implementation: vectorized
  mixing_initial_weight: 0.5

evaluation:
  suite: validation
  namespace: eval
  seed: ${runtime.seed}
  artifact_level: ${evaluation_suites.${evaluation.suite}.artifact_level}
  task_failure_policy: continue
  return_terms: true

load:
  # Set by validation planning to the train attempt's checkpoint.
  path: ???
  mode: model_only
  strict: true
  allow_protocol_mismatch: false

timing:
  cuda_synchronize: false

final_eval_sampler_params:
  n_walkers: 16
  burn_in: 1
  n_steps: 1
  proposal_scale: 0.35
  max_samples: 8

# =============================================================================
# Component specs
# =============================================================================
runner:
  _target_: spenn.runner.Evaluate
  model: ${model}
  load: ${load}
  evaluator: ${evaluator}

evaluator:
  _target_: spenn.evaluation.Evaluator
  namespace: ${evaluation.namespace}
  seed: ${evaluation.seed}
  artifact_level: ${evaluation.artifact_level}
  task_failure_policy: ${evaluation.task_failure_policy}
  tasks: ${evaluation_suites.${evaluation.suite}.tasks}

evaluation_suites:
  validation:
    artifact_level: summaries
    tasks:
      - ${evaluation_tasks.cusp}
      - ${evaluation_tasks.tail}
      - ${evaluation_tasks.stratified_geometry}
      - ${evaluation_tasks.hooke_orbital}
      - ${evaluation_tasks.full_model_antisymmetry}
      - ${evaluation_tasks.trace_equivariance}
      - ${evaluation_tasks.feature_trace_stability}
      - ${evaluation_tasks.readout_trace_stability}
  final_eval:
    artifact_level: records
    tasks:
      - ${evaluation_tasks.final_cusp}
      - ${evaluation_tasks.final_tail}
      - ${evaluation_tasks.final_stratified_geometry}
      - ${evaluation_tasks.final_hooke_orbital}
      - ${evaluation_tasks.final_mcmc_energy}
      - ${evaluation_tasks.final_full_model_antisymmetry}
      - ${evaluation_tasks.final_spatial_exchange_symmetry}
      - ${evaluation_tasks.final_rotation_consistency}
      - ${evaluation_tasks.final_trace_equivariance}
      - ${evaluation_tasks.final_feature_trace_stability}
      - ${evaluation_tasks.final_readout_trace_stability}

evaluation_tasks:
  cusp:
    name: cusp
    namespace: ${evaluation.namespace}/cusp
    output_dir: ${run.dir}/cusp
    generator:
      _target_: spenn.evaluation.generators.CuspGridGenerator
      n_points: 2
      r12_min: 1.0e-4
      r12_max: 1.0e-1
      n_directions: 1
      center_of_mass_radii: [0.0]
      paired_directions: true
      seed: ${evaluation.seed}
    calculators:
      - _target_: spenn.evaluation.calculators.LocalEnergyCalculator
        hamiltonian_terms: ${hamiltonian_terms}
        return_terms: ${evaluation.return_terms}
        chunk_size: 256
      - _target_: spenn.evaluation.calculators.WavefunctionCalculator
      - _target_: spenn.evaluation.calculators.RadialLogAbsDerivativeCalculator
    summaries:
      - _target_: spenn.evaluation.summaries.LocalEnergySummary
      - _target_: spenn.evaluation.summaries.CoalescenceDivergenceSummary
      - _target_: spenn.evaluation.summaries.OppositeSpinCuspSummary
      - _target_: spenn.evaluation.summaries.SampledRecordWriter
  tail:
    name: tail
    namespace: ${evaluation.namespace}/tail
    output_dir: ${run.dir}/tail
    generator:
      _target_: spenn.evaluation.generators.TailGridGenerator
      radius_min: 0.5
      radius_max: 8.0
      n_points: 2
      pair_distance: 1.0
      n_directions: 1
      seed: ${evaluation.seed}
    calculators:
      - _target_: spenn.evaluation.calculators.LocalEnergyCalculator
        hamiltonian_terms: ${hamiltonian_terms}
        return_terms: ${evaluation.return_terms}
        chunk_size: 256
      - _target_: spenn.evaluation.calculators.WavefunctionCalculator
    summaries:
      - _target_: spenn.evaluation.summaries.LocalEnergySummary
      - _target_: spenn.evaluation.summaries.LocalEnergyStabilitySummary
        abs_threshold: 10.0
      - _target_: spenn.evaluation.summaries.LocalEnergyPathologySummary
      - _target_: spenn.evaluation.summaries.SampledRecordWriter
  stratified_geometry:
    name: stratified_geometry
    namespace: ${evaluation.namespace}/stratified_geometry
    output_dir: ${run.dir}/stratified_geometry
    generator:
      _target_: spenn.evaluation.generators.StratifiedGeometryGenerator
      n_samples: 4
      seed: ${evaluation.seed}
      strata: {cusp: 0.25, moderate_pair: 0.25, bulk: 0.25, tail: 0.25}
      bounds:
        cusp: {r12_min: 1.0e-4, r12_max: 0.1, radius_max: 2.0}
        moderate_pair: {r12_min: 0.1, r12_max: 1.5, radius_max: 3.0}
        bulk: {r12_min: 0.5, r12_max: 3.0, radius_max: 4.0}
        tail: {r12_min: 0.5, r12_max: 6.0, radius_min: 4.0, radius_max: 8.0}
    calculators:
      - _target_: spenn.evaluation.calculators.LocalEnergyCalculator
        hamiltonian_terms: ${hamiltonian_terms}
        return_terms: ${evaluation.return_terms}
        chunk_size: 256
      - _target_: spenn.evaluation.calculators.WavefunctionCalculator
    summaries:
      - _target_: spenn.evaluation.summaries.LocalEnergySummary
      - _target_: spenn.evaluation.summaries.LocalEnergyStabilitySummary
        abs_threshold: 10.0
      - _target_: spenn.evaluation.summaries.LocalEnergyPathologySummary
      - _target_: spenn.evaluation.summaries.SampledRecordWriter
  hooke_orbital:
    name: hooke_orbital
    namespace: ${evaluation.namespace}/hooke_orbital
    output_dir: ${run.dir}/hooke_orbital
    generator:
      _target_: spenn.evaluation.generators.HookeOrbitalGenerator
      n_samples: 4
      omega: ${system.omega}
      seed: ${evaluation.seed}
    calculators:
      - _target_: spenn.evaluation.calculators.LocalEnergyCalculator
        hamiltonian_terms: ${hamiltonian_terms}
        return_terms: ${evaluation.return_terms}
        chunk_size: 256
      - _target_: spenn.evaluation.calculators.WavefunctionCalculator
    summaries:
      - _target_: spenn.evaluation.summaries.LocalEnergySummary
      - _target_: spenn.evaluation.summaries.LocalEnergyStabilitySummary
        abs_threshold: 10.0
      - _target_: spenn.evaluation.summaries.LocalEnergyPathologySummary
      - _target_: spenn.evaluation.summaries.SampledRecordWriter
  full_model_antisymmetry:
    name: full_model_antisymmetry
    namespace: ${evaluation.namespace}/full_model_antisymmetry
    output_dir: ${run.dir}/full_model_antisymmetry
    generator:
      _target_: spenn.evaluation.generators.PermutationOrbitGenerator
      n_permutations: 1
      seed: ${evaluation.seed}
      base_generator:
        _target_: spenn.evaluation.generators.StratifiedGeometryGenerator
        n_samples: 4
        seed: ${evaluation.seed}
        strata: {cusp: 0.25, moderate_pair: 0.25, bulk: 0.25, tail: 0.25}
        bounds:
          cusp: {r12_min: 1.0e-4, r12_max: 0.1, radius_max: 2.0}
          moderate_pair: {r12_min: 0.1, r12_max: 1.5, radius_max: 3.0}
          bulk: {r12_min: 0.5, r12_max: 3.0, radius_max: 4.0}
          tail: {r12_min: 0.5, r12_max: 6.0, radius_min: 4.0, radius_max: 8.0}
    calculators:
      - _target_: spenn.evaluation.calculators.FullModelAntisymmetryCalculator
    summaries:
      - _target_: spenn.evaluation.summaries.TransformConsistencySummary
  trace_equivariance:
    name: trace_equivariance
    namespace: ${evaluation.namespace}/trace_equivariance
    output_dir: ${run.dir}/trace_equivariance
    generator:
      _target_: spenn.evaluation.generators.PermutationOrbitGenerator
      n_permutations: 1
      seed: ${evaluation.seed}
      base_generator:
        _target_: spenn.evaluation.generators.StratifiedGeometryGenerator
        n_samples: 2
        seed: ${evaluation.seed}
        strata: {cusp: 0.25, moderate_pair: 0.25, bulk: 0.25, tail: 0.25}
        bounds:
          cusp: {r12_min: 1.0e-4, r12_max: 0.1, radius_max: 2.0}
          moderate_pair: {r12_min: 0.1, r12_max: 1.5, radius_max: 3.0}
          bulk: {r12_min: 0.5, r12_max: 3.0, radius_max: 4.0}
          tail: {r12_min: 0.5, r12_max: 6.0, radius_min: 4.0, radius_max: 8.0}
    calculators:
      - _target_: spenn.evaluation.calculators.TraceEquivarianceCalculator
    summaries:
      - _target_: spenn.evaluation.summaries.TraceEquivarianceSummary
  feature_trace_stability:
    name: feature_trace_stability
    namespace: ${evaluation.namespace}/feature_trace_stability
    output_dir: ${run.dir}/feature_trace_stability
    generator:
      _target_: spenn.evaluation.generators.StratifiedGeometryGenerator
      n_samples: 4
      seed: ${evaluation.seed}
      strata: {cusp: 0.25, moderate_pair: 0.25, bulk: 0.25, tail: 0.25}
      bounds:
        cusp: {r12_min: 1.0e-4, r12_max: 0.1, radius_max: 2.0}
        moderate_pair: {r12_min: 0.1, r12_max: 1.5, radius_max: 3.0}
        bulk: {r12_min: 0.5, r12_max: 3.0, radius_max: 4.0}
        tail: {r12_min: 0.5, r12_max: 6.0, radius_min: 4.0, radius_max: 8.0}
    calculators:
      - _target_: spenn.evaluation.calculators.FeatureTraceCalculator
    summaries:
      - _target_: spenn.evaluation.summaries.FeatureTraceSummary
  readout_trace_stability:
    name: readout_trace_stability
    namespace: ${evaluation.namespace}/readout_trace_stability
    output_dir: ${run.dir}/readout_trace_stability
    generator:
      _target_: spenn.evaluation.generators.StratifiedGeometryGenerator
      n_samples: 4
      seed: ${evaluation.seed}
      strata: {cusp: 0.25, moderate_pair: 0.25, bulk: 0.25, tail: 0.25}
      bounds:
        cusp: {r12_min: 1.0e-4, r12_max: 0.1, radius_max: 2.0}
        moderate_pair: {r12_min: 0.1, r12_max: 1.5, radius_max: 3.0}
        bulk: {r12_min: 0.5, r12_max: 3.0, radius_max: 4.0}
        tail: {r12_min: 0.5, r12_max: 6.0, radius_min: 4.0, radius_max: 8.0}
    calculators:
      - _target_: spenn.evaluation.calculators.ReadoutTraceCalculator
    summaries:
      - _target_: spenn.evaluation.summaries.ReadoutTraceSummary

  final_cusp:
    name: cusp
    namespace: ${evaluation.namespace}/cusp
    output_dir: ${run.dir}/cusp
    generator:
      _target_: spenn.evaluation.generators.CuspGridGenerator
      n_points: 2
      r12_min: 1.0e-5
      r12_max: 2.0e-1
      n_directions: 1
      center_of_mass_radii: [0.0]
      paired_directions: true
      seed: ${evaluation.seed}
    calculators:
      - _target_: spenn.evaluation.calculators.LocalEnergyCalculator
        hamiltonian_terms: ${hamiltonian_terms}
        return_terms: ${evaluation.return_terms}
        chunk_size: 512
      - _target_: spenn.evaluation.calculators.WavefunctionCalculator
      - _target_: spenn.evaluation.calculators.RadialLogAbsDerivativeCalculator
    summaries:
      - _target_: spenn.evaluation.summaries.LocalEnergySummary
      - _target_: spenn.evaluation.summaries.CoalescenceDivergenceSummary
      - _target_: spenn.evaluation.summaries.OppositeSpinCuspSummary
      - _target_: spenn.evaluation.summaries.SampledRecordWriter
        filename: cusp_profiles.csv

  final_tail:
    name: tail
    namespace: ${evaluation.namespace}/tail
    output_dir: ${run.dir}/tail
    generator:
      _target_: spenn.evaluation.generators.TailGridGenerator
      radius_min: 0.5
      radius_max: 12.0
      n_points: 2
      pair_distance: 1.0
      n_directions: 1
      seed: ${evaluation.seed}
    calculators:
      - _target_: spenn.evaluation.calculators.LocalEnergyCalculator
        hamiltonian_terms: ${hamiltonian_terms}
        return_terms: ${evaluation.return_terms}
        chunk_size: 512
      - _target_: spenn.evaluation.calculators.WavefunctionCalculator
    summaries:
      - _target_: spenn.evaluation.summaries.LocalEnergySummary
      - _target_: spenn.evaluation.summaries.LocalEnergyStabilitySummary
        abs_threshold: 10.0
      - _target_: spenn.evaluation.summaries.LocalEnergyPathologySummary
      - _target_: spenn.evaluation.summaries.SampledRecordWriter
        filename: tail_profiles.csv

  final_stratified_geometry:
    name: stratified_geometry
    namespace: ${evaluation.namespace}/stratified_geometry
    output_dir: ${run.dir}/stratified_geometry
    generator:
      _target_: spenn.evaluation.generators.StratifiedGeometryGenerator
      n_samples: 4
      seed: ${evaluation.seed}
      strata: {cusp: 0.25, moderate_pair: 0.25, bulk: 0.25, tail: 0.25}
      bounds:
        cusp: {r12_min: 1.0e-5, r12_max: 0.1, radius_max: 2.0}
        moderate_pair: {r12_min: 0.1, r12_max: 1.5, radius_max: 3.0}
        bulk: {r12_min: 0.5, r12_max: 3.0, radius_max: 4.0}
        tail: {r12_min: 0.5, r12_max: 8.0, radius_min: 4.0, radius_max: 12.0}
    calculators:
      - _target_: spenn.evaluation.calculators.LocalEnergyCalculator
        hamiltonian_terms: ${hamiltonian_terms}
        return_terms: ${evaluation.return_terms}
        chunk_size: 512
      - _target_: spenn.evaluation.calculators.WavefunctionCalculator
    summaries:
      - _target_: spenn.evaluation.summaries.LocalEnergySummary
      - _target_: spenn.evaluation.summaries.LocalEnergyStabilitySummary
        abs_threshold: 10.0
      - _target_: spenn.evaluation.summaries.LocalEnergyPathologySummary
      - _target_: spenn.evaluation.summaries.SampledRecordWriter
        filename: stratified_metrics.csv

  final_hooke_orbital:
    name: hooke_orbital
    namespace: ${evaluation.namespace}/hooke_orbital
    output_dir: ${run.dir}/hooke_orbital
    generator:
      _target_: spenn.evaluation.generators.HookeOrbitalGenerator
      n_samples: 4
      omega: ${system.omega}
      seed: ${evaluation.seed}
    calculators:
      - _target_: spenn.evaluation.calculators.LocalEnergyCalculator
        hamiltonian_terms: ${hamiltonian_terms}
        return_terms: ${evaluation.return_terms}
        chunk_size: 512
      - _target_: spenn.evaluation.calculators.WavefunctionCalculator
    summaries:
      - _target_: spenn.evaluation.summaries.LocalEnergySummary
      - _target_: spenn.evaluation.summaries.LocalEnergyStabilitySummary
        abs_threshold: 10.0
      - _target_: spenn.evaluation.summaries.LocalEnergyPathologySummary
      - _target_: spenn.evaluation.summaries.SampledRecordWriter
        filename: hooke_orbital_metrics.csv

  final_mcmc_energy:
    name: energy
    namespace: ${evaluation.namespace}/energy
    output_dir: ${run.dir}/energy
    generator:
      _target_: spenn.evaluation.generators.MCMCGenerator
      sampler: ${final_eval_sampler}
      seed: ${evaluation.seed}
      max_samples: ${final_eval_sampler_params.max_samples}
    calculators:
      - _target_: spenn.evaluation.calculators.LocalEnergyCalculator
        hamiltonian_terms: ${hamiltonian_terms}
        return_terms: ${evaluation.return_terms}
        chunk_size: 512
      - _target_: spenn.evaluation.calculators.WavefunctionCalculator
    summaries:
      - _target_: spenn.evaluation.summaries.LocalEnergySummary
      - _target_: spenn.evaluation.summaries.LocalEnergyStabilitySummary
        abs_threshold: 10.0
      - _target_: spenn.evaluation.summaries.LocalEnergyPathologySummary
      - _target_: spenn.evaluation.summaries.HamiltonianTermSummary
      - _target_: spenn.evaluation.summaries.SamplerStatsSummary
      - _target_: spenn.evaluation.summaries.SampledRecordWriter
        filename: mcmc_energy_samples.csv

  final_full_model_antisymmetry:
    name: full_model_antisymmetry
    namespace: ${evaluation.namespace}/full_model_antisymmetry
    output_dir: ${run.dir}/full_model_antisymmetry
    generator:
      _target_: spenn.evaluation.generators.PermutationOrbitGenerator
      n_permutations: 1
      seed: ${evaluation.seed}
      base_generator:
        _target_: spenn.evaluation.generators.StratifiedGeometryGenerator
        n_samples: 4
        seed: ${evaluation.seed}
        strata: {cusp: 0.25, moderate_pair: 0.25, bulk: 0.25, tail: 0.25}
        bounds:
          cusp: {r12_min: 1.0e-5, r12_max: 0.1, radius_max: 2.0}
          moderate_pair: {r12_min: 0.1, r12_max: 1.5, radius_max: 3.0}
          bulk: {r12_min: 0.5, r12_max: 3.0, radius_max: 4.0}
          tail: {r12_min: 0.5, r12_max: 8.0, radius_min: 4.0, radius_max: 12.0}
    calculators:
      - _target_: spenn.evaluation.calculators.FullModelAntisymmetryCalculator
    summaries:
      - _target_: spenn.evaluation.summaries.TransformConsistencySummary
      - _target_: spenn.evaluation.summaries.TransformRecordWriter

  final_spatial_exchange_symmetry:
    name: spatial_exchange_symmetry
    namespace: ${evaluation.namespace}/spatial_exchange_symmetry
    output_dir: ${run.dir}/spatial_exchange_symmetry
    generator:
      _target_: spenn.evaluation.generators.ExchangeOrbitGenerator
      exchange: opposite_spin_pair
      base_generator:
        _target_: spenn.evaluation.generators.StratifiedGeometryGenerator
        n_samples: 4
        seed: ${evaluation.seed}
        strata: {cusp: 0.25, moderate_pair: 0.25, bulk: 0.25, tail: 0.25}
        bounds:
          cusp: {r12_min: 1.0e-5, r12_max: 0.1, radius_max: 2.0}
          moderate_pair: {r12_min: 0.1, r12_max: 1.5, radius_max: 3.0}
          bulk: {r12_min: 0.5, r12_max: 3.0, radius_max: 4.0}
          tail: {r12_min: 0.5, r12_max: 8.0, radius_min: 4.0, radius_max: 12.0}
    calculators:
      - _target_: spenn.evaluation.calculators.SpatialExchangeSymmetryCalculator
    summaries:
      - _target_: spenn.evaluation.summaries.TransformConsistencySummary
      - _target_: spenn.evaluation.summaries.TransformRecordWriter

  final_rotation_consistency:
    name: rotation_consistency
    namespace: ${evaluation.namespace}/rotation_consistency
    output_dir: ${run.dir}/rotation_consistency
    generator:
      _target_: spenn.evaluation.generators.RotationOrbitGenerator
      n_rotations: 1
      seed: ${evaluation.seed}
      base_generator:
        _target_: spenn.evaluation.generators.StratifiedGeometryGenerator
        n_samples: 4
        seed: ${evaluation.seed}
        strata: {cusp: 0.25, moderate_pair: 0.25, bulk: 0.25, tail: 0.25}
        bounds:
          cusp: {r12_min: 1.0e-5, r12_max: 0.1, radius_max: 2.0}
          moderate_pair: {r12_min: 0.1, r12_max: 1.5, radius_max: 3.0}
          bulk: {r12_min: 0.5, r12_max: 3.0, radius_max: 4.0}
          tail: {r12_min: 0.5, r12_max: 8.0, radius_min: 4.0, radius_max: 12.0}
    calculators:
      - _target_: spenn.evaluation.calculators.RotationConsistencyCalculator
        hamiltonian_terms: ${hamiltonian_terms}
        chunk_size: 512
    summaries:
      - _target_: spenn.evaluation.summaries.TransformConsistencySummary
      - _target_: spenn.evaluation.summaries.TransformRecordWriter

  final_trace_equivariance:
    name: trace_equivariance
    namespace: ${evaluation.namespace}/trace_equivariance
    output_dir: ${run.dir}/trace_equivariance
    generator:
      _target_: spenn.evaluation.generators.PermutationOrbitGenerator
      n_permutations: 1
      seed: ${evaluation.seed}
      base_generator:
        _target_: spenn.evaluation.generators.StratifiedGeometryGenerator
        n_samples: 2
        seed: ${evaluation.seed}
        strata: {cusp: 0.25, moderate_pair: 0.25, bulk: 0.25, tail: 0.25}
        bounds:
          cusp: {r12_min: 1.0e-5, r12_max: 0.1, radius_max: 2.0}
          moderate_pair: {r12_min: 0.1, r12_max: 1.5, radius_max: 3.0}
          bulk: {r12_min: 0.5, r12_max: 3.0, radius_max: 4.0}
          tail: {r12_min: 0.5, r12_max: 8.0, radius_min: 4.0, radius_max: 12.0}
    calculators:
      - _target_: spenn.evaluation.calculators.TraceEquivarianceCalculator
    summaries:
      - _target_: spenn.evaluation.summaries.TraceEquivarianceSummary
      - _target_: spenn.evaluation.summaries.TraceRecordWriter

  final_feature_trace_stability:
    name: feature_trace_stability
    namespace: ${evaluation.namespace}/feature_trace_stability
    output_dir: ${run.dir}/feature_trace_stability
    generator:
      _target_: spenn.evaluation.generators.StratifiedGeometryGenerator
      n_samples: 4
      seed: ${evaluation.seed}
      strata: {cusp: 0.25, moderate_pair: 0.25, bulk: 0.25, tail: 0.25}
      bounds:
        cusp: {r12_min: 1.0e-5, r12_max: 0.1, radius_max: 2.0}
        moderate_pair: {r12_min: 0.1, r12_max: 1.5, radius_max: 3.0}
        bulk: {r12_min: 0.5, r12_max: 3.0, radius_max: 4.0}
        tail: {r12_min: 0.5, r12_max: 8.0, radius_min: 4.0, radius_max: 12.0}
    calculators:
      - _target_: spenn.evaluation.calculators.FeatureTraceCalculator
    summaries:
      - _target_: spenn.evaluation.summaries.FeatureTraceSummary
      - _target_: spenn.evaluation.summaries.TraceRecordWriter

  final_readout_trace_stability:
    name: readout_trace_stability
    namespace: ${evaluation.namespace}/readout_trace_stability
    output_dir: ${run.dir}/readout_trace_stability
    generator:
      _target_: spenn.evaluation.generators.StratifiedGeometryGenerator
      n_samples: 4
      seed: ${evaluation.seed}
      strata: {cusp: 0.25, moderate_pair: 0.25, bulk: 0.25, tail: 0.25}
      bounds:
        cusp: {r12_min: 1.0e-5, r12_max: 0.1, radius_max: 2.0}
        moderate_pair: {r12_min: 0.1, r12_max: 1.5, radius_max: 3.0}
        bulk: {r12_min: 0.5, r12_max: 3.0, radius_max: 4.0}
        tail: {r12_min: 0.5, r12_max: 8.0, radius_min: 4.0, radius_max: 12.0}
    calculators:
      - _target_: spenn.evaluation.calculators.ReadoutTraceCalculator
    summaries:
      - _target_: spenn.evaluation.summaries.ReadoutTraceSummary
      - _target_: spenn.evaluation.summaries.TraceRecordWriter

# -----------------------------------------------------------------------------
# Model: identical wiring to pair_stability.yaml so the checkpoint restores.
# -----------------------------------------------------------------------------
model:
  _target_: spenn.nn.SpENNWaveFunction
  trace_name: spenn
  seed: ${model_initialization.seed}  # Legacy interpolation shim only.
  basis: ${choices.basis.${run_parameters.basis_slot}.basis}
  embedding:
    _target_: spenn.nn.Embedding
    max_order: ${model_params.max_order}
    spatial_dim: ${system.spatial_dim}
    out_channels: ${model_params.channels}
    hidden_channels: ${model_params.hidden_channels}
    num_hidden_layers: ${model_params.num_hidden_layers}
    include_spins: false
    in_features: ${spenn.basis_feature_dim:${model.basis}}
    initializer:
      _target_: spenn.nn.TorchInitializer
      seed: ${model_initialization.seed}
      stream: model.embedding
  embedding_activation: ${choices.mechanism.${run_parameters.mechanism_slot}.embedding_activation}
  layers:
    - _target_: spenn.nn.SpENNLayer
      mixing:
        _target_: spenn.nn.EquivariantMixing
        max_order: ${model_params.max_order}
        max_virtual_order: ${model_params.max_virtual_order}
        channels: ${model_params.channels}
        implementation: ${model_params.mixing_implementation}
        initial_weight: ${model_params.mixing_initial_weight}
      fourier:
        _target_: spenn.reps.FourierTransform
      feature_activation: ${choices.mechanism.${run_parameters.mechanism_slot}.feature_activation}
      feature_envelope: ${choices.mechanism.${run_parameters.mechanism_slot}.feature_envelope}
      irrep_activation: ${choices.mechanism.${run_parameters.mechanism_slot}.irrep_activation}
      path_aggregation:
        _target_: spenn.nn.PathAggregation
        max_order: ${model_params.max_order}
        max_virtual_order: ${model_params.max_virtual_order}
        channels: ${model_params.channels}
        initializer:
          _target_: spenn.nn.TorchInitializer
          seed: ${model_initialization.seed}
          stream: model.layers.0.path_aggregation
      inverse_fourier:
        _target_: spenn.reps.InverseFourierTransform
      update:
        _target_: spenn.nn.ResidualUpdate
      update_activation: ${choices.mechanism.${run_parameters.mechanism_slot}.update_activation}
      update_envelope: ${choices.mechanism.${run_parameters.mechanism_slot}.update_envelope}
  envelope:
    _target_: spenn.nn.AdditiveEnvelope
    envelopes:
      - _target_: spenn.nn.HookeGaussianEnvelope
        omega: ${system.omega}
      - _target_: spenn.nn.ElectronElectronCusp
  readout:
    _target_: spenn.nn.readout.PfaffianReadout
    channels: ${model_params.channels}

hamiltonian_terms:
  kinetic:
    _target_: spenn.physics.kinetic.KineticEnergy
  harmonic_trap:
    _target_: spenn.physics.potential.HarmonicTrap
    omega: ${system.omega}
  electron_electron:
    _target_: spenn.physics.potential.ElectronElectronInteraction

final_eval_sampler:
  _target_: spenn.sampling.metropolis.MetropolisSampler
  n_walkers: ${final_eval_sampler_params.n_walkers}
  burn_in: ${final_eval_sampler_params.burn_in}
  n_steps: ${final_eval_sampler_params.n_steps}
  proposal_scale: ${final_eval_sampler_params.proposal_scale}
  seed: ${evaluation.seed}
  n_electrons: ${system.n_particles}
  spatial_dim: ${system.spatial_dim}
  n_up: ${system.spin.n_up}
  n_down: ${system.spin.n_down}
  dtype: ${runtime.dtype}

callbacks:
  - _target_: spenn.callback.ConfigSnapshot
    triggers: [run_start]
    output_path: ${run.dir}/config.yaml
  - _target_: spenn.callback.ResolvedConfigSnapshot
    triggers: [run_start]
    output_path: ${run.dir}/resolved_config.yaml
  - _target_: spenn.callback.Metadata
    triggers: [run_start, run_end, exception]
    output_path: ${run.dir}/metadata.json
  - _target_: spenn.callback.Status
    triggers: [run_start, run_end, evaluate_end, exception]
    output_path: ${run.dir}/status.json
  - _target_: spenn.callback.RunTiming
    triggers: [run_start, run_end, exception]
    cuda_synchronize: ${timing.cuda_synchronize}
  - _target_: spenn.callback.EvaluationTiming
    triggers: [evaluate_start, evaluate_end, exception]
    cuda_synchronize: ${timing.cuda_synchronize}
  - _target_: spenn.callback.DiagnosticTiming
    triggers: [diagnostic_start, diagnostic_end, diagnostic_failed]
    cuda_synchronize: ${timing.cuda_synchronize}
  - _target_: spenn.callback.ArtifactIndex
  - _target_: spenn.callback.FailureLog

loggers:
  - _target_: spenn.logging.CSV
    path: ${run.dir}/metrics.csv
  - _target_: spenn.logging.JSONL
    path: ${run.dir}/metrics.jsonl
