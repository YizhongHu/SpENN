# =============================================================================
# Hooke pair benchmark final evaluation (PR8 post-selection reporting)
# =============================================================================
#
# Purpose:
#   Held-out final evaluation of the model/protocol selected by the pair
#   validation study (experiments/hooke/studies/pair_validation/). Restores a
#   trained checkpoint, samples with the large final-evaluation sampler, and
#   reports eval/* metrics including exact-reference error.
#
# ---- BEGIN AI-FACED CONFIG GUIDANCE ----
#
# This config is intended for:
#   - final benchmark evaluation runs generated by evaluate_selected.py
#   - eval/* reporting against the exact Hooke reference energy
#   - restoring trained weights via evaluation.checkpoint
#
# This config is not intended for:
#   - training (use experiments/hooke/configs/benchmark/pair_train.yaml)
#   - model/protocol selection (validation/* metrics own selection; this
#     config may use the exact reference energy precisely because selection
#     is already frozen)
#   - smoke testing (use experiments/hooke/configs/smoke/pair_eval.yaml)
#
# ----- END AI-FACED CONFIG GUIDANCE -----
#
# Runs are launched by the commands evaluate_selected.py generates. The script
# derives one self-contained config per (training seed, eval seed) pair from
# this template — replacing `model:` with the explicit trained model spec and
# baking in checkpoint path, seeds, study identity, and sampler settings — so
# each generated run is just:
#
#   uv run python run.py --config <output_dir>/final_eval_config_seed100_eval100000.yaml
#
# =============================================================================


# =============================================================================
# Parameter blocks: user-facing knobs and shared values
# =============================================================================

# -----------------------------------------------------------------------------
# Experiment identity
# -----------------------------------------------------------------------------
experiment:
  name: hooke_pair_benchmark
  sector: pair
  run_name: hooke_pair_benchmark_final_eval


# -----------------------------------------------------------------------------
# Study provenance
# -----------------------------------------------------------------------------
# evaluate_selected.py sets study.name/config_id so the final-benchmark
# collector can group eval runs; both land in resolved_config.yaml.
study:
  name: null
  config_id: null


# -----------------------------------------------------------------------------
# Run directory
# -----------------------------------------------------------------------------
run:
  root: outputs
  run_id: null
  dir: null
  timezone: America/New_York


# -----------------------------------------------------------------------------
# Runtime
# -----------------------------------------------------------------------------
# runtime.seed is the *evaluation* seed: it seeds the evaluation sampler and
# must come from the manifest's final_evaluation.eval_seeds, never from the
# validation seeds.
runtime:
  seed: 100000
  device: cuda
  dtype: float64


# -----------------------------------------------------------------------------
# Terminal logging
# -----------------------------------------------------------------------------
terminal:
  enabled: true
  level: info
  color: auto
  rich: auto
  # `progress` should remain false for SLURM-compatible, line-oriented logs.
  progress: false


# -----------------------------------------------------------------------------
# Optional W&B dashboard tracking
# -----------------------------------------------------------------------------
# W&B is a dashboard projection only; the local run directory stays
# authoritative and the final benchmark summary never reads W&B.
wandb:
  project: SpENN-QMC
  entity: null
  name: ${run.run_id}
  mode: online
  group: hooke_pair_final_v1
  job_type: eval
  tags:
    - hooke-pair
    - ${runtime.device}
    - final-eval
  mirror_scalars: true
  dashboard_aliases: true
  health_flags: true
  log_artifacts: false


# -----------------------------------------------------------------------------
# Physical system
# -----------------------------------------------------------------------------
system:
  name: hooke_pair
  n_particles: 2
  spatial_dim: 3
  omega: 0.5
  spin:
    n_up: 1
    n_down: 1


# -----------------------------------------------------------------------------
# Reference values
# -----------------------------------------------------------------------------
# Exact-reference comparison is allowed here (and only here): final evaluation
# reports eval/energy_error and eval/energy_abs_error after the protocol froze.
references:
  # Exact ground-state energy of the omega=0.5 Hooke singlet (Taut 1993).
  exact_energy: 2.0


# -----------------------------------------------------------------------------
# Model scale
# -----------------------------------------------------------------------------
# Template defaults only: evaluate_selected.py replaces the `model:` block
# below with the explicit model spec of the training run (resolved from the
# selected overrides, or copied from the training run's resolved_config.yaml),
# and load_model_checkpoint is strict, so any mismatch fails loudly.
gate_targets:
  silu: torch.nn.SiLU
  sigmoid: torch.nn.Sigmoid

model_params:
  max_order: 2
  max_virtual_order: 2
  channels: 8
  hidden_channels: 16
  num_hidden_layers: 1
  layers: 1
  gate_activation: silu
  include_spins: true
  mixing_implementation: vectorized
  mixing_initial_weight: 0.5
  # Fixed Hooke Gaussian tail: exp(-(omega / 2) * sum_i |r_i|^2).
  harmonic_confinement_coefficient: 0.25


# -----------------------------------------------------------------------------
# Final evaluation sampler scale
# -----------------------------------------------------------------------------
# Deliberately larger than the validation sampler (manifest
# final_evaluation.sampler is the protocol source of truth; evaluate_selected.py
# passes overrides when the manifest differs).
sampler_params:
  n_walkers: 8192
  burn_in: 1000
  n_steps: 500
  proposal_scale: 0.35


# -----------------------------------------------------------------------------
# Evaluation
# -----------------------------------------------------------------------------
evaluation:
  # Trained-weights checkpoint to restore (required; no trained default).
  # evaluate_selected.py points this at <train_run_dir>/checkpoints/latest.pt.
  checkpoint: ???
  # Strict state-dict loading: missing/unexpected keys fail loudly.
  checkpoint_strict: true
  # Structured checkpoints store a model_config_hash; when set, the checkpoint
  # hash must match or loading fails. evaluate_selected.py fills this in for
  # structured-checkpoint runs and leaves it null for the legacy
  # resolved-config workaround (pre-schema checkpoints carry no hash).
  expected_model_config_hash: null
  # Explicit escape hatch only; canonical benchmark runs must keep this false.
  allow_model_config_mismatch: false
  # Provenance only: the training seed of the restored checkpoint, recorded in
  # resolved_config.yaml for the final benchmark summary.
  training_seed: null
  return_terms: true


# -----------------------------------------------------------------------------
# Timing
# -----------------------------------------------------------------------------
timing:
  # Set true on GPU runs for accurate timings; adds a small synchronization cost.
  cuda_synchronize: false


# =============================================================================
# Component specs: Hydra-instantiated objects
# =============================================================================

# -----------------------------------------------------------------------------
# Runner
# -----------------------------------------------------------------------------
# Evaluate samples once from the restored model and feeds one shared
# EvaluationContext to the EnergyEvaluation diagnostic.
runner:
  _target_: spenn.runner.Evaluate
  model:
    _target_: spenn.callback.checkpoint.load_model_checkpoint
    model: ${model}
    path: ${evaluation.checkpoint}
    strict: ${evaluation.checkpoint_strict}
    expected_model_config_hash: ${evaluation.expected_model_config_hash}
    allow_model_config_mismatch: ${evaluation.allow_model_config_mismatch}
  sampler: ${sampler}
  hamiltonian_terms: ${hamiltonian_terms}
  return_terms: ${evaluation.return_terms}
  diagnostics:
    - _target_: spenn.diagnostics.EnergyEvaluation
      name: energy
      reference_energy: ${references.exact_energy}
      include_terms: true


# -----------------------------------------------------------------------------
# Model
# -----------------------------------------------------------------------------
model:
  _target_: spenn.nn.SpENNWaveFunction
  trace_name: spenn

  embedding:
    _target_: spenn.nn.Embedding
    max_order: ${model_params.max_order}
    spatial_dim: ${system.spatial_dim}
    out_channels: ${model_params.channels}
    hidden_channels: ${model_params.hidden_channels}
    num_hidden_layers: ${model_params.num_hidden_layers}
    include_spins: ${model_params.include_spins}

  layers:
    - _target_: spenn.nn.SpENNLayer

      mixing:
        _target_: spenn.nn.EquivariantMixing
        max_order: ${model_params.max_order}
        max_virtual_order: ${model_params.max_virtual_order}
        channels: ${model_params.channels}
        implementation: ${model_params.mixing_implementation}
        initial_weight: ${model_params.mixing_initial_weight}

      fourier:
        _target_: spenn.reps.FourierTransform

      activation:
        _target_: spenn.nn.GatedNormActivation
        gate:
          _target_: ${gate_targets.${model_params.gate_activation}}

      path_aggregation:
        _target_: spenn.nn.PathAggregation
        max_order: ${model_params.max_order}
        max_virtual_order: ${model_params.max_virtual_order}
        channels: ${model_params.channels}

      inverse_fourier:
        _target_: spenn.reps.InverseFourierTransform

      update:
        _target_: spenn.nn.ResidualUpdate

  envelope:
    _target_: spenn.nn.AdditiveEnvelope
    envelopes:
      - _target_: spenn.nn.HarmonicConfinement
        coefficient: ${model_params.harmonic_confinement_coefficient}
      - _target_: spenn.nn.ElectronElectronCusp

  readout:
    _target_: spenn.nn.readout.PfaffianReadout
    channels: ${model_params.channels}


# -----------------------------------------------------------------------------
# Hamiltonian
# -----------------------------------------------------------------------------
hamiltonian_terms:
  kinetic:
    _target_: spenn.physics.kinetic.KineticEnergy

  harmonic_trap:
    _target_: spenn.physics.potential.HarmonicTrap
    omega: ${system.omega}

  electron_electron:
    _target_: spenn.physics.potential.ElectronElectronInteraction


# -----------------------------------------------------------------------------
# Sampler
# -----------------------------------------------------------------------------
sampler:
  _target_: spenn.sampling.metropolis.MetropolisSampler
  n_walkers: ${sampler_params.n_walkers}
  burn_in: ${sampler_params.burn_in}
  n_steps: ${sampler_params.n_steps}
  proposal_scale: ${sampler_params.proposal_scale}
  seed: ${runtime.seed}

  n_electrons: ${system.n_particles}
  spatial_dim: ${system.spatial_dim}
  n_up: ${system.spin.n_up}
  n_down: ${system.spin.n_down}
  dtype: ${runtime.dtype}


# -----------------------------------------------------------------------------
# Callbacks
# -----------------------------------------------------------------------------
callbacks:
  - _target_: spenn.callback.ConfigSnapshot
    triggers:
      - run_start
    output_path: ${run.dir}/config.yaml

  - _target_: spenn.callback.ResolvedConfigSnapshot
    triggers:
      - run_start
    output_path: ${run.dir}/resolved_config.yaml

  - _target_: spenn.callback.Metadata
    triggers:
      - run_start
      - run_end
      - exception
    output_path: ${run.dir}/metadata.json

  - _target_: spenn.callback.Status
    triggers:
      - run_start
      - run_end
      - evaluate_end
      - exception
    output_path: ${run.dir}/status.json

  # Whole-run wall-clock timing: runtime/wall_time_sec.
  - _target_: spenn.callback.RunTiming
    triggers:
      - run_start
      - run_end
      - exception
    cuda_synchronize: ${timing.cuda_synchronize}

  # Evaluation wall time: eval/perf/wall_time_sec.
  - _target_: spenn.callback.EvaluationTiming
    triggers:
      - evaluate_start
      - evaluate_end
      - exception
    cuda_synchronize: ${timing.cuda_synchronize}

  # Per-diagnostic durations: diagnostics/<name>/time_sec.
  - _target_: spenn.callback.DiagnosticTiming
    triggers:
      - diagnostic_start
      - diagnostic_end
      - diagnostic_failed
    cuda_synchronize: ${timing.cuda_synchronize}


# -----------------------------------------------------------------------------
# Loggers
# -----------------------------------------------------------------------------
# Local metrics are authoritative. The final benchmark summary reads only the
# run directories; W&B is optional visualization.
loggers:
  - _target_: spenn.logging.CSV
    path: ${run.dir}/metrics.csv

  - _target_: spenn.logging.JSONL
    path: ${run.dir}/metrics.jsonl

  # Optional W&B dashboard logger. Uncomment only when optional W&B support is
  # installed (`uv sync --extra cu126 --extra wandb`) and you are authenticated.
  #
  # - _target_: spenn.logging.WandB
  #   project: ${wandb.project}
  #   entity: ${wandb.entity}
  #   name: ${wandb.name}
  #   mode: ${wandb.mode}
  #   group: ${wandb.group}
  #   job_type: ${wandb.job_type}
  #   tags: ${wandb.tags}
  #   mirror_scalars: ${wandb.mirror_scalars}
  #   dashboard_aliases: ${wandb.dashboard_aliases}
  #   health_flags: ${wandb.health_flags}
  #   log_artifacts: ${wandb.log_artifacts}
