# =============================================================================
# Hooke pair benchmark training (PR8 validation scan base config)
# =============================================================================
#
# Purpose:
#   Training config for the two-electron Hooke system used as the base of the
#   pair validation study (experiments/hooke/studies/pair_validation/).
#
# ---- BEGIN AI-FACED CONFIG GUIDANCE ----
#
# This config is intended for:
#   - validation-scan training runs launched by the user
#   - train-end validation with an independent sampler (validation/* metrics)
#   - grid overrides on optimizer_params.lr, model_params.channels,
#     model_params.gate_activation, and runtime.seed
#
# This config is not intended for:
#   - final held-out benchmark evaluation (use an Evaluate config with
#     reference_energy for eval/* reporting)
#   - smoke testing (use experiments/hooke/configs/smoke/pair_train.yaml)
#
# ----- END AI-FACED CONFIG GUIDANCE -----
#
# Grid points are launched externally (loop or SLURM array), e.g.:
#
#   uv run python run.py --config experiments/hooke/configs/benchmark/pair_train.yaml \
#     optimizer_params.lr=1e-3 model_params.channels=32 \
#     model_params.gate_activation=silu runtime.seed=3 \
#     study.name=hooke_pair_validation_v1
#
# =============================================================================


# =============================================================================
# Parameter blocks: user-facing knobs and shared values
# =============================================================================

# -----------------------------------------------------------------------------
# Experiment identity
# -----------------------------------------------------------------------------
experiment:
  name: hooke_pair_benchmark
  sector: pair
  run_name: hooke_pair_benchmark_train


# -----------------------------------------------------------------------------
# Study provenance
# -----------------------------------------------------------------------------
# Identifies which study (if any) launched this run. The launcher sets
# study.name via an override; future PR8.2 post-processing may derive a
# deterministic config_id from resolved grid fields when config_id is null.
# Both fields land in resolved_config.yaml and checkpoint manifests.
study:
  name: null
  config_id: null


# -----------------------------------------------------------------------------
# Run directory
# -----------------------------------------------------------------------------
run:
  root: outputs
  run_id: null
  dir: null
  timezone: America/New_York


# -----------------------------------------------------------------------------
# Runtime
# -----------------------------------------------------------------------------
runtime:
  seed: 3
  device: cuda
  dtype: float64


# -----------------------------------------------------------------------------
# Terminal logging
# -----------------------------------------------------------------------------
terminal:
  enabled: true
  level: info
  color: auto
  rich: auto
  # `progress` should remain false for SLURM-compatible, line-oriented logs.
  progress: false


# -----------------------------------------------------------------------------
# Optional W&B dashboard tracking
# -----------------------------------------------------------------------------
# W&B is a dashboard projection only; the local run directory stays
# authoritative and study selection never reads W&B.
#
# Project policy:
#   - test runs           -> project SpENN-QMC-test
#   - real validation scan -> project SpENN-QMC with the tags below
wandb:
  project: SpENN-QMC
  entity: null
  # Use the SpENN run id as the W&B run name so dashboard runs map 1:1 to
  # local run directories. Populated by run setup before loggers instantiate.
  name: ${run.run_id}
  mode: online
  group: hooke_pair_validation_v1
  job_type: train
  tags:
    - hooke-pair
    - ${runtime.device}
    - study-v1
  mirror_scalars: true
  dashboard_aliases: true
  health_flags: true
  log_artifacts: false


# -----------------------------------------------------------------------------
# Physical system
# -----------------------------------------------------------------------------
system:
  name: hooke_pair
  n_particles: 2
  spatial_dim: 3
  omega: 0.5
  spin:
    n_up: 1
    n_down: 1


# -----------------------------------------------------------------------------
# Model scale
# -----------------------------------------------------------------------------
# Lookup table mapping the gate_activation knob to a torch module target.
gate_targets:
  silu: torch.nn.SiLU
  sigmoid: torch.nn.Sigmoid

model_params:
  max_order: 2
  max_virtual_order: 2
  # `channels` is a primary grid axis of the validation study.
  channels: 8
  hidden_channels: 16
  num_hidden_layers: 1
  # `layers` documents the SpENN layer count. The component spec below must
  # list exactly this many SpENNLayer entries; study v1 pins layers=1.
  layers: 1
  # `gate_activation` selects the GatedNormActivation gate via gate_targets.
  gate_activation: silu
  include_spins: true
  # Benchmark runs use the vectorized mixing kernel for throughput.
  mixing_implementation: vectorized
  mixing_initial_weight: 0.5
  # Fixed Hooke Gaussian tail: exp(-(omega / 2) * sum_i |r_i|^2).
  harmonic_confinement_coefficient: 0.25


# -----------------------------------------------------------------------------
# Sampler scale
# -----------------------------------------------------------------------------
sampler_params:
  n_walkers: 1024
  burn_in: 500
  n_steps: 10
  proposal_scale: 0.35


# -----------------------------------------------------------------------------
# Training
# -----------------------------------------------------------------------------
training:
  max_steps: 2000
  log_every_n_steps: 10
  return_terms: true

optimizer_params:
  # Primary grid axis of the validation study.
  lr: 1.0e-3


# -----------------------------------------------------------------------------
# Validation (model/protocol selection estimator)
# -----------------------------------------------------------------------------
# Validation runs an independent sampler on the trained model at train_end and
# logs validation/* metrics. It never compares against the exact reference
# energy; exact-reference reporting belongs to final evaluation (eval/*).
# To disable validation, remove this block, the validation_sampler spec, and
# the Validation callback entry.
validation:
  namespace: validation
  return_terms: true

validation_sampler_params:
  n_walkers: 2048
  burn_in: 500
  n_steps: 200
  proposal_scale: 0.35
  # Distinct from every training seed so validation samples are independent.
  seed: 114514


# -----------------------------------------------------------------------------
# Runtime data-integrity check cadence
# -----------------------------------------------------------------------------
checks:
  every_n_steps: 50
  fail_fast: true

  data_integrity:
    max_nonfinite_energy_fraction: 0.0
    max_nonfinite_logabs_fraction: 0.0
    check_loss: true
    check_wavefunction_output: true
    check_batch: true
    strict_sign_values: true

  gradients:
    check_finite: true

  sampler:
    fail_fast: false

  equivariance:
    # Equivariance checks are expensive; spot-check during benchmark training.
    probability: 1.0
    permutation_fraction: 1.0
    max_permutations: 1
    atol: 1.0e-06
    rtol: 1.0e-06


# -----------------------------------------------------------------------------
# Timing
# -----------------------------------------------------------------------------
timing:
  # Rolling window (in steps) for the step-time rolling mean.
  rolling_window: 20
  # Set true on GPU runs for accurate timings; adds a small synchronization cost.
  cuda_synchronize: false


# -----------------------------------------------------------------------------
# Checkpoint restore
# -----------------------------------------------------------------------------
checkpoint:
  path: null
  restore_mode: none
  strict: true
  allow_protocol_mismatch: false


# -----------------------------------------------------------------------------
# Checkpoint writing
# -----------------------------------------------------------------------------
checkpointing:
  every_n_steps: 500
  keep_last: 3
  save_optimizer: true
  save_trainer: true
  save_sampler: true
  save_rng: true


# -----------------------------------------------------------------------------
# Human-facing status cadence
# -----------------------------------------------------------------------------
status:
  every_n_steps: 50
  include:
    - train/loss
    - train/energy
    - train/energy_stderr
    - train/sampler/acceptance_rate
    - train/grad_norm
    - train/local_energy_finite_fraction


# =============================================================================
# Component specs: Hydra-instantiated objects
# =============================================================================

# -----------------------------------------------------------------------------
# Runner
# -----------------------------------------------------------------------------
runner:
  _target_: spenn.runner.Train
  model: ${model}
  sampler: ${sampler}
  hamiltonian_terms: ${hamiltonian_terms}
  optimizer: ${optimizer}
  trainer: ${trainer}
  checkpoint: ${checkpoint}


# -----------------------------------------------------------------------------
# Model
# -----------------------------------------------------------------------------
model:
  _target_: spenn.nn.SpENNWaveFunction
  trace_name: spenn

  embedding:
    _target_: spenn.nn.Embedding
    max_order: ${model_params.max_order}
    spatial_dim: ${system.spatial_dim}
    out_channels: ${model_params.channels}
    hidden_channels: ${model_params.hidden_channels}
    num_hidden_layers: ${model_params.num_hidden_layers}
    include_spins: ${model_params.include_spins}

  layers:
    - _target_: spenn.nn.SpENNLayer

      mixing:
        _target_: spenn.nn.EquivariantMixing
        max_order: ${model_params.max_order}
        max_virtual_order: ${model_params.max_virtual_order}
        channels: ${model_params.channels}
        implementation: ${model_params.mixing_implementation}
        initial_weight: ${model_params.mixing_initial_weight}

      fourier:
        _target_: spenn.reps.FourierTransform

      activation:
        _target_: spenn.nn.GatedNormActivation
        gate:
          _target_: ${gate_targets.${model_params.gate_activation}}

      path_aggregation:
        _target_: spenn.nn.PathAggregation
        max_order: ${model_params.max_order}
        max_virtual_order: ${model_params.max_virtual_order}
        channels: ${model_params.channels}

      inverse_fourier:
        _target_: spenn.reps.InverseFourierTransform

      update:
        _target_: spenn.nn.ResidualUpdate

  envelope:
    _target_: spenn.nn.AdditiveEnvelope
    envelopes:
      - _target_: spenn.nn.HarmonicConfinement
        coefficient: ${model_params.harmonic_confinement_coefficient}
      - _target_: spenn.nn.ElectronElectronCusp

  readout:
    _target_: spenn.nn.readout.PfaffianReadout
    channels: ${model_params.channels}


# -----------------------------------------------------------------------------
# Hamiltonian
# -----------------------------------------------------------------------------
hamiltonian_terms:
  kinetic:
    _target_: spenn.physics.kinetic.KineticEnergy

  harmonic_trap:
    _target_: spenn.physics.potential.HarmonicTrap
    omega: ${system.omega}

  electron_electron:
    _target_: spenn.physics.potential.ElectronElectronInteraction


# -----------------------------------------------------------------------------
# Sampler
# -----------------------------------------------------------------------------
sampler:
  _target_: spenn.sampling.metropolis.MetropolisSampler
  n_walkers: ${sampler_params.n_walkers}
  burn_in: ${sampler_params.burn_in}
  n_steps: ${sampler_params.n_steps}
  proposal_scale: ${sampler_params.proposal_scale}
  seed: ${runtime.seed}

  n_electrons: ${system.n_particles}
  spatial_dim: ${system.spatial_dim}
  n_up: ${system.spin.n_up}
  n_down: ${system.spin.n_down}
  dtype: ${runtime.dtype}


# -----------------------------------------------------------------------------
# Validation sampler
# -----------------------------------------------------------------------------
# Fresh sampler instance for the Validation callback. It must never share
# chain state with the training sampler above.
validation_sampler:
  _target_: spenn.sampling.metropolis.MetropolisSampler
  n_walkers: ${validation_sampler_params.n_walkers}
  burn_in: ${validation_sampler_params.burn_in}
  n_steps: ${validation_sampler_params.n_steps}
  proposal_scale: ${validation_sampler_params.proposal_scale}
  seed: ${validation_sampler_params.seed}

  n_electrons: ${system.n_particles}
  spatial_dim: ${system.spatial_dim}
  n_up: ${system.spin.n_up}
  n_down: ${system.spin.n_down}
  dtype: ${runtime.dtype}


# -----------------------------------------------------------------------------
# Optimizer
# -----------------------------------------------------------------------------
optimizer:
  _target_: torch.optim.Adam
  _partial_: true
  lr: ${optimizer_params.lr}


# -----------------------------------------------------------------------------
# Trainer
# -----------------------------------------------------------------------------
trainer:
  _target_: spenn.training.trainer.VMCTrainer
  max_steps: ${training.max_steps}
  log_every_n_steps: ${training.log_every_n_steps}
  return_terms: ${training.return_terms}


# -----------------------------------------------------------------------------
# Callbacks
# -----------------------------------------------------------------------------
callbacks:
  - _target_: spenn.callback.ConfigSnapshot
    triggers:
      - run_start
    output_path: ${run.dir}/config.yaml

  - _target_: spenn.callback.ResolvedConfigSnapshot
    triggers:
      - run_start
    output_path: ${run.dir}/resolved_config.yaml

  - _target_: spenn.callback.Metadata
    triggers:
      - run_start
      - run_end
      - exception
    output_path: ${run.dir}/metadata.json

  - _target_: spenn.callback.Status
    triggers:
      - run_start
      - run_end
      - exception
    output_path: ${run.dir}/status.json

  - _target_: spenn.callback.DataIntegrity
    triggers:
      - step_end
    every_n_steps: ${checks.every_n_steps}
    fail_fast: ${checks.fail_fast}
    max_nonfinite_energy_fraction: ${checks.data_integrity.max_nonfinite_energy_fraction}
    max_nonfinite_logabs_fraction: ${checks.data_integrity.max_nonfinite_logabs_fraction}
    check_loss: ${checks.data_integrity.check_loss}
    check_wavefunction_output: ${checks.data_integrity.check_wavefunction_output}
    check_batch: ${checks.data_integrity.check_batch}
    strict_sign_values: ${checks.data_integrity.strict_sign_values}

  - _target_: spenn.callback.GradientStats
    triggers:
      - step_end
    every_n_steps: ${checks.every_n_steps}
    fail_fast: ${checks.fail_fast}
    check_finite: ${checks.gradients.check_finite}

  - _target_: spenn.callback.SamplerHealth
    triggers:
      - step_end
    every_n_steps: ${checks.every_n_steps}
    fail_fast: ${checks.sampler.fail_fast}

  - _target_: spenn.callback.RuntimeEquivariance
    triggers:
      - step_end
    every_n_steps: ${checks.every_n_steps}
    probability: ${checks.equivariance.probability}
    fail_fast: ${checks.fail_fast}
    artifact_dir: ${run.dir}/checks/equivariance
    checkers:
      - _target_: spenn.equivariance.checks.FullModelEquivarianceChecker
        permutation_fraction: ${checks.equivariance.permutation_fraction}
        max_permutations: ${checks.equivariance.max_permutations}
        seed: ${runtime.seed}
        atol: ${checks.equivariance.atol}
        rtol: ${checks.equivariance.rtol}

      - _target_: spenn.equivariance.checks.TraceEquivarianceChecker
        permutation_fraction: ${checks.equivariance.permutation_fraction}
        max_permutations: ${checks.equivariance.max_permutations}
        seed: ${runtime.seed}
        compare_output: false
        atol: ${checks.equivariance.atol}
        rtol: ${checks.equivariance.rtol}

  # Train-end validation with an independent sampler. Logs validation/* and
  # validation/sampler/* metrics for model/protocol selection; never uses the
  # exact reference energy.
  - _target_: spenn.callback.Validation
    triggers:
      - train_end
    namespace: ${validation.namespace}
    sampler: ${validation_sampler}
    hamiltonian_terms: ${hamiltonian_terms}
    return_terms: ${validation.return_terms}
    diagnostics:
      - _target_: spenn.diagnostics.EnergyEvaluation
        name: energy
        include_terms: true

  - _target_: spenn.callback.Checkpoint
    triggers:
      - step_end
    every_n_steps: ${checkpointing.every_n_steps}
    output_dir: ${run.dir}/checkpoints
    keep_last: ${checkpointing.keep_last}
    save_optimizer: ${checkpointing.save_optimizer}
    save_trainer: ${checkpointing.save_trainer}
    save_sampler: ${checkpointing.save_sampler}
    save_rng: ${checkpointing.save_rng}

  # Whole-run wall-clock timing: runtime/wall_time_sec (a selection
  # tie-breaker in the validation study) and unix timestamps.
  - _target_: spenn.callback.RunTiming
    triggers:
      - run_start
      - run_end
      - exception
    cuda_synchronize: ${timing.cuda_synchronize}

  # Per-step timing: train/perf/step_time_sec and its rolling mean.
  - _target_: spenn.callback.TrainStepTiming
    triggers:
      - step_start
      - step_end
    rolling_window: ${timing.rolling_window}
    cuda_synchronize: ${timing.cuda_synchronize}

  - _target_: spenn.callback.Status
    triggers:
      - step_end
    every_n_steps: ${status.every_n_steps}
    include: ${status.include}


# -----------------------------------------------------------------------------
# Loggers
# -----------------------------------------------------------------------------
# Local metrics are authoritative. Study collection and selection read only
# the run directories; W&B is optional visualization.
loggers:
  - _target_: spenn.logging.CSV
    path: ${run.dir}/metrics.csv

  - _target_: spenn.logging.JSONL
    path: ${run.dir}/metrics.jsonl

  # Optional W&B dashboard logger. Uncomment only when optional W&B support is
  # installed (`uv sync --extra cu126 --extra wandb`) and you are authenticated.
  #
  # - _target_: spenn.logging.WandB
  #   project: ${wandb.project}
  #   entity: ${wandb.entity}
  #   name: ${wandb.name}
  #   mode: ${wandb.mode}
  #   group: ${wandb.group}
  #   job_type: ${wandb.job_type}
  #   tags: ${wandb.tags}
  #   mirror_scalars: ${wandb.mirror_scalars}
  #   dashboard_aliases: ${wandb.dashboard_aliases}
  #   health_flags: ${wandb.health_flags}
  #   log_artifacts: ${wandb.log_artifacts}
