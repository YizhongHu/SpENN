# =============================================================================
#  SpENN | Hooke pair preflight training
# -----------------------------------------------------------------------------
#  experiment : hooke_pair_smoke        runner : spenn.runner.Train
#  system     : 2e Hooke atom, w=0.5    budget : ~seconds on CPU
# =============================================================================
#
# Purpose:
#   Check numerical stability during basic training.
#
# Workflow position:
#
#   pair_train.yaml  --checkpoints/-->  pair_eval.yaml  -->  benchmark configs
#   (this file)                         (sampled eval)       (future PRs)
#
# Config style:
#   The first half of this file contains parameter blocks: readable knobs that
#   are not instantiated directly. The second half contains component specs:
#   Hydra-instantiated objects that reference the parameter blocks.
#
# Example:
#
#   parameter: <value>
#
#   component:
#     need_parameter: ${parameter}
#
# =============================================================================


# =============================================================================
# Parameter blocks: user-facing knobs and shared values
# =============================================================================

# -----------------------------------------------------------------------------
# Experiment identity
# -----------------------------------------------------------------------------
experiment:
  name: hooke_pair_preflight
  sector: pair
  run_name: hooke_pair_preflight_train


# -----------------------------------------------------------------------------
# Run directory
# -----------------------------------------------------------------------------
# They will be automatically populated by the runner. Users can optionally specify
# them to control the directory structure or for debugging.
run:
  root: outputs
  run_id: null
  dir: null
  # IANA timezone used for human-readable run IDs, metadata, and status files.
  # The code default is UTC; Harvard cluster logs use New York time here.
  timezone: America/New_York


# -----------------------------------------------------------------------------
# Runtime
# -----------------------------------------------------------------------------
runtime:
  seed: 0
  device: cpu
  dtype: float64


# -----------------------------------------------------------------------------
# Terminal logging
# -----------------------------------------------------------------------------
# Configures terminal UI
terminal:
  enabled: true
  level: info
  # `color`:
  #   auto   - use color when appropriate
  #   always - force ANSI color, including in SLURM logs
  #   never  - disable ANSI color
  color: auto
  rich: auto
  # `progress` should remain false for SLURM-compatible, line-oriented logs.
  progress: false


# -----------------------------------------------------------------------------
# Optional W&B dashboard tracking
# -----------------------------------------------------------------------------
#
# W&B is an optional dashboard/monitoring projection.
# Local CSV/JSONL logs and the run directory remain authoritative.
#
# Default policy:
#   - log scalar metrics
#   - log compact config/provenance metadata
#   - do not upload checkpoints, traces, or raw batches
#   - do not upload per-sample arrays
#
# To enable W&B:
#   1. Install optional W&B support.
#   2. Authenticate with `wandb login` or set `WANDB_API_KEY`.
#   3. Uncomment the WandB logger in the `loggers:` section at the bottom.
#
wandb:
  project: spenn-qmc-test
  entity: null
  # Use the SpENN run id as the W&B run name so dashboard runs map 1:1 to
  # local run directories. Populated by run setup before loggers instantiate.
  name: ${run.run_id}
  # online   - stream metrics to W&B
  # offline  - write locally and sync later with `wandb sync`
  # disabled - no-op, if supported by the logger
  mode: online
  group: ${experiment.name}
  job_type: train
  tags:
    - hooke
    - preflight
    - train
    - ${runtime.device}

  # W&B should mirror scalar metrics using the canonical namespace/key path:
  #   namespace = train/sampler
  #   key       = acceptance_rate
  #   W&B name  = train/sampler/acceptance_rate
  mirror_scalars: true

  # Add a small curated dashboard/* layer for easy visualization.
  dashboard_aliases: true

  # Add numeric health/* flags such as health/run_ok when derivable.
  health_flags: true

  # Keep artifact upload off by default. Checkpoints remain local.
  log_artifacts: false


# -----------------------------------------------------------------------------
# Physical system
# -----------------------------------------------------------------------------
system:
  name: hooke_pair
  n_particles: 2
  spatial_dim: 3
  omega: 0.5
  # to-be changed: spin can be free and optimized by runner
  spin:
    n_up: 1
    n_down: 1


# -----------------------------------------------------------------------------
# Model scale
# -----------------------------------------------------------------------------
model_params:
  # `max_order`:
  #   Maximum real feature body order used by the embedding/model.
  max_order: 2
  # `max_virtual_order`:
  #   Maximum virtual order used by equivariant mixing/path aggregation.
  max_virtual_order: 2
  # `channels`:
  #   Feature channel count throughout this model.
  channels: 32
  # `hidden_channels` and `num_hidden_layers`:
  #   Embedding MLP size.
  hidden_channels: 32
  num_hidden_layers: 1
  include_spins: true
  # `mixing_implementation`:
  #   SpENN supports multiple mixing implementations. This config uses the slow
  #   reference implementation to maximize test coverage.
  mixing_implementation: slow
  mixing_initial_weight: 0.5
  # Fixed Hooke Gaussian tail: exp(-(omega / 2) * sum_i |r_i|^2).
  harmonic_confinement_coefficient: 0.25


# -----------------------------------------------------------------------------
# Sampler scale
# -----------------------------------------------------------------------------
sampler_params:
  # `n_walkers`:
  #   Number of configurations sampled per training step.
  n_walkers: 512
  # `burn_in`:
  #   Number of initial MCMC updates before collecting samples.
  burn_in: 100
  # `n_steps`:
  #   Number of MCMC updates used between returned samples.
  n_steps: 10
  # `proposal_scale`:
  #   Gaussian proposal scale for Metropolis moves.
  proposal_scale: 0.35


# -----------------------------------------------------------------------------
# Training
# -----------------------------------------------------------------------------
training:
  max_steps: 50
  log_every_n_steps: 1
  return_terms: true # If true, compute/log named Hamiltonian term contributions.

optimizer_params:
  lr: 0.0 #0.00001


# -----------------------------------------------------------------------------
# Runtime validation cadence
# -----------------------------------------------------------------------------
checks:
  every_n_steps: 1
  fail_fast: true

  data_integrity:
    max_nonfinite_energy_fraction: 0.0
    max_nonfinite_logabs_fraction: 0.0
    check_loss: true
    check_wavefunction_output: true
    check_batch: true
    strict_sign_values: true

  gradients:
    check_finite: true

  sampler:
    fail_fast: false

  equivariance:
    probability: 1.0
    permutation_fraction: 1.0
    max_permutations: 120
    atol: 1.0e-06
    rtol: 1.0e-06


# -----------------------------------------------------------------------------
# Checkpoint restore
# -----------------------------------------------------------------------------
load:
  path: null
  mode: none
  strict: true
  allow_protocol_mismatch: false


# -----------------------------------------------------------------------------
# Checkpoint writing
# -----------------------------------------------------------------------------
checkpoint:
  every_n_steps: 10
  keep_last: 3
  save_optimizer: true
  save_trainer: true
  save_sampler: true
  save_rng: true


# -----------------------------------------------------------------------------
# Timing
# -----------------------------------------------------------------------------
timing:
  # Rolling window (in steps) for the step-time rolling mean.
  rolling_window: 20
  # Set true on GPU runs for accurate timings; adds a small synchronization cost.
  cuda_synchronize: false


# -----------------------------------------------------------------------------
# Human-facing status cadence
# -----------------------------------------------------------------------------
# Smoke runs are short, so report every step. Steps are 0-indexed and the
# cadence gate fires when step % every_n_steps == 0, so the first step always
# reports regardless of cadence. Benchmark configs should use a lower cadence
# such as every_n_steps: 10.
status:
  every_n_steps: 1
  include:
    - train/loss
    - train/energy
    - train/energy_stderr
    - train/sampler/acceptance_rate
    - train/grad_norm
    - train/local_energy_finite_fraction
    - train/perf/step_time_sec
    - train/perf/step_time_sec_rolling_mean


# =============================================================================
# Component specs: Hydra-instantiated objects
# =============================================================================

# -----------------------------------------------------------------------------
# Runner
# -----------------------------------------------------------------------------
#
# The runner owns the high-level lifecycle for this run.
#
# Train receives already-configured model/sampler/Hamiltonian/optimizer/trainer
# component specs.
runner:
  _target_: spenn.runner.Train
  model: ${model}
  sampler: ${sampler}
  hamiltonian_terms: ${hamiltonian_terms}
  optimizer: ${optimizer}
  trainer: ${trainer}
  load: ${load}


# -----------------------------------------------------------------------------
# Model
# -----------------------------------------------------------------------------
#
# SpENNWaveFunction is the trainable ansatz.
model:
  _target_: spenn.nn.SpENNWaveFunction
  trace_name: spenn # Name for traceable SpENN components.

  embedding:
    _target_: spenn.nn.Embedding
    max_order: ${model_params.max_order}
    spatial_dim: ${system.spatial_dim}
    out_channels: ${model_params.channels}
    hidden_channels: ${model_params.hidden_channels}
    num_hidden_layers: ${model_params.num_hidden_layers}
    include_spins: ${model_params.include_spins}

  layers:
    - _target_: spenn.nn.SpENNLayer

      mixing:
        _target_: spenn.nn.EquivariantMixing
        max_order: ${model_params.max_order}
        max_virtual_order: ${model_params.max_virtual_order}
        channels: ${model_params.channels}
        implementation: ${model_params.mixing_implementation}
        initial_weight: ${model_params.mixing_initial_weight}

      fourier:
        _target_: spenn.reps.FourierTransform

      activation:
        _target_: spenn.nn.GatedNormActivation
        gate:
          _target_: torch.nn.SiLU

      path_aggregation:
        _target_: spenn.nn.PathAggregation
        max_order: ${model_params.max_order}
        max_virtual_order: ${model_params.max_virtual_order}
        channels: ${model_params.channels}

      inverse_fourier:
        _target_: spenn.reps.InverseFourierTransform

      update:
        _target_: spenn.nn.ResidualUpdate

  envelope:
    _target_: spenn.nn.AdditiveEnvelope
    envelopes:
      - _target_: spenn.nn.HarmonicConfinement
        coefficient: ${model_params.harmonic_confinement_coefficient}
      - _target_: spenn.nn.ElectronElectronCusp

  readout:
    _target_: spenn.nn.readout.PfaffianReadout
    channels: ${model_params.channels}


# -----------------------------------------------------------------------------
# Hamiltonian
# -----------------------------------------------------------------------------
hamiltonian_terms:
  kinetic:
    _target_: spenn.physics.kinetic.KineticEnergy

  harmonic_trap:
    _target_: spenn.physics.potential.HarmonicTrap
    omega: ${system.omega}

  electron_electron:
    _target_: spenn.physics.potential.ElectronElectronInteraction


# -----------------------------------------------------------------------------
# Sampler
# -----------------------------------------------------------------------------
sampler:
  _target_: spenn.sampling.metropolis.MetropolisSampler
  n_walkers: ${sampler_params.n_walkers}
  burn_in: ${sampler_params.burn_in}
  n_steps: ${sampler_params.n_steps}
  proposal_scale: ${sampler_params.proposal_scale}
  seed: ${runtime.seed}

  n_electrons: ${system.n_particles}
  spatial_dim: ${system.spatial_dim}
  n_up: ${system.spin.n_up}
  n_down: ${system.spin.n_down}
  dtype: ${runtime.dtype}


# -----------------------------------------------------------------------------
# Optimizer
# -----------------------------------------------------------------------------
optimizer:
  _target_: torch.optim.Adam
  # `_partial_: true` means Hydra returns an optimizer factory. The runner/trainer
  # supplies model parameters after model setup and eager-initialization checks.
  _partial_: true
  lr: ${optimizer_params.lr}


# -----------------------------------------------------------------------------
# Trainer
# -----------------------------------------------------------------------------
trainer:
  _target_: spenn.training.trainer.VMCTrainer
  max_steps: ${training.max_steps}
  log_every_n_steps: ${training.log_every_n_steps}
  return_terms: ${training.return_terms}


# -----------------------------------------------------------------------------
# Callbacks
# -----------------------------------------------------------------------------
# Callbacks own lifecycle side effects, runtime checks, checkpoints, and
# human-facing status.
#
# Loggers own persistent machine-readable metrics.
callbacks:
  # Save the authored config at run start.
  - _target_: spenn.callback.ConfigSnapshot
    triggers:
      - run_start
    output_path: ${run.dir}/config.yaml

  # Save the fully resolved config at run start.
  - _target_: spenn.callback.ResolvedConfigSnapshot
    triggers:
      - run_start
    output_path: ${run.dir}/resolved_config.yaml

  # Save run metadata, including start/end/failure lifecycle information.
  - _target_: spenn.callback.Metadata
    triggers:
      - run_start
      - run_end
      - exception
    output_path: ${run.dir}/metadata.json

  # Save compact lifecycle status for quick inspection.
  - _target_: spenn.callback.Status
    triggers:
      - run_start
      - run_end
      - exception
    output_path: ${run.dir}/status.json

  # Whole-run wall-clock timing: runtime/wall_time_sec and unix timestamps.
  - _target_: spenn.callback.RunTiming
    triggers:
      - run_start
      - run_end
      - exception
    cuda_synchronize: ${timing.cuda_synchronize}

  # Per-step timing: train/perf/step_time_sec and its rolling mean.
  - _target_: spenn.callback.TrainStepTiming
    triggers:
      - step_start
      - step_end
    rolling_window: ${timing.rolling_window}
    cuda_synchronize: ${timing.cuda_synchronize}

  # Fail fast on nonfinite energies/logabs or malformed wavefunction/batch data.
  - _target_: spenn.callback.DataIntegrity
    triggers:
      - step_end
    every_n_steps: ${checks.every_n_steps}
    fail_fast: ${checks.fail_fast}
    max_nonfinite_energy_fraction: ${checks.data_integrity.max_nonfinite_energy_fraction}
    max_nonfinite_logabs_fraction: ${checks.data_integrity.max_nonfinite_logabs_fraction}
    check_loss: ${checks.data_integrity.check_loss}
    check_wavefunction_output: ${checks.data_integrity.check_wavefunction_output}
    check_batch: ${checks.data_integrity.check_batch}
    strict_sign_values: ${checks.data_integrity.strict_sign_values}

  # Track gradient norms and optionally fail on nonfinite gradients.
  - _target_: spenn.callback.GradientStats
    triggers:
      - step_end
    every_n_steps: ${checks.every_n_steps}
    fail_fast: ${checks.fail_fast}
    check_finite: ${checks.gradients.check_finite}

  # Track sampler health. This is warning-oriented in the smoke config.
  - _target_: spenn.callback.SamplerHealth
    triggers:
      - step_end
    every_n_steps: ${checks.every_n_steps}
    fail_fast: ${checks.sampler.fail_fast}

  # Runtime equivariance checks. These are intentionally frequent in smoke runs.
  - _target_: spenn.callback.RuntimeEquivariance
    triggers:
      - step_end
    every_n_steps: ${checks.every_n_steps}
    probability: ${checks.equivariance.probability}
    fail_fast: ${checks.fail_fast}
    artifact_dir: ${run.dir}/checks/equivariance
    checkers:
      - _target_: spenn.equivariance.checks.FullModelEquivarianceChecker
        permutation_fraction: ${checks.equivariance.permutation_fraction}
        max_permutations: ${checks.equivariance.max_permutations}
        seed: ${runtime.seed}
        atol: ${checks.equivariance.atol}
        rtol: ${checks.equivariance.rtol}

      - _target_: spenn.equivariance.checks.TraceEquivarianceChecker
        permutation_fraction: ${checks.equivariance.permutation_fraction}
        max_permutations: ${checks.equivariance.max_permutations}
        seed: ${runtime.seed}
        compare_output: false
        atol: ${checks.equivariance.atol}
        rtol: ${checks.equivariance.rtol}

  # Save checkpoints. Smoke runs checkpoint every step; benchmark configs should
  # usually use a lower cadence.
  - _target_: spenn.callback.Checkpoint
    triggers:
      - step_end
    every_n_steps: ${checkpoint.every_n_steps}
    output_dir: ${run.dir}/checkpoints
    keep_last: ${checkpoint.keep_last}
    save_optimizer: ${checkpoint.save_optimizer}
    save_trainer: ${checkpoint.save_trainer}
    save_sampler: ${checkpoint.save_sampler}
    save_rng: ${checkpoint.save_rng}

  # Human-facing terminal progress. This should render compact lines for local
  # terminals and SLURM logs. It is not the authoritative metrics record.
  - _target_: spenn.callback.Status
    triggers:
      - step_end
    every_n_steps: ${status.every_n_steps}
    include: ${status.include}


# -----------------------------------------------------------------------------
# Loggers
# -----------------------------------------------------------------------------
# Local metrics are authoritative.
#
# CSV uses long-form scalar records:
#   step, namespace, key, value
#
# JSONL stores structured records for easier downstream parsing.
#
# W&B, when enabled, is only a dashboard projection of scalar metrics and compact
# provenance. It should not upload checkpoints/traces/raw batches by default.
loggers:
  - _target_: spenn.logging.CSV
    path: ${run.dir}/metrics.csv

  - _target_: spenn.logging.JSONL
    path: ${run.dir}/metrics.jsonl

  # Optional W&B dashboard logger.
  #
  # Uncomment this block only when optional W&B support is installed.
  #
  # - _target_: spenn.logging.WandB
  #   project: ${wandb.project}
  #   entity: ${wandb.entity}
  #   name: ${wandb.name}
  #   mode: ${wandb.mode}
  #   group: ${wandb.group}
  #   job_type: ${wandb.job_type}
  #   tags: ${wandb.tags}
  #   mirror_scalars: ${wandb.mirror_scalars}
  #   dashboard_aliases: ${wandb.dashboard_aliases}
  #   health_flags: ${wandb.health_flags}
  #   log_artifacts: ${wandb.log_artifacts}
  #   # Compact provenance mirrored into the W&B run config: links the
  #   # dashboard run back to the authoritative local run directory.
  #   config:
  #     run_id: ${run.run_id}
  #     run_dir: ${run.dir}
  #     experiment: ${experiment.name}
  #     sector: ${experiment.sector}
