# =============================================================================
#  SpENN | Hooke pair smoke evaluation
# -----------------------------------------------------------------------------
#  experiment : hooke_pair_smoke        runner : spenn.runner.Evaluate
#  system     : 2e Hooke atom, w=0.5    budget : ~seconds on CPU
# =============================================================================
#
# Purpose:
#   Cheap end-to-end sampled-evaluation sanity check for the two-electron Hooke
#   system. Exercises the Evaluate runner, EnergyEvaluation diagnostics, and
#   the eval metric namespaces against a freshly initialized SpENN ansatz.
#
# Workflow position:
#
#   pair_train.yaml  --checkpoints/-->  pair_eval.yaml  -->  benchmark configs
#   (VMC training)                      (this file)          (future PRs)
#
# ---- BEGIN AI-FACED CONFIG GUIDANCE ----
#
# This config is intended for:
#   - verifying Evaluate runner wiring (sampler -> local energy -> diagnostics)
#   - checking eval metric namespaces (eval, eval/sampler, eval/perf,
#     diagnostics/energy)
#   - producing local CSV/JSONL metrics for inspection
#
# This config is not intended for:
#   - benchmark-quality energies (the ansatz here is untrained)
#   - final scientific evaluation
#   - architecture comparison
#
# The reported eval/energy_abs_error against `references.exact_energy` is
# expected to be large; it documents the metric path, not model quality.
#
# ----- END AI-FACED CONFIG GUIDANCE -----
#
# Config style:
#   The first half of this file contains parameter blocks: readable knobs that
#   are not instantiated directly. The second half contains component specs:
#   Hydra-instantiated objects that reference the parameter blocks.
#
# Example:
#
#   parameter: <value>
#
#   component:
#     need_parameter: ${parameter}
#
# =============================================================================


# =============================================================================
# Parameter blocks: user-facing knobs and shared values
# =============================================================================

# -----------------------------------------------------------------------------
# Experiment identity
# -----------------------------------------------------------------------------
experiment:
  name: hooke_pair_smoke
  sector: pair
  run_name: hooke_pair_smoke_eval


# -----------------------------------------------------------------------------
# Run directory
# -----------------------------------------------------------------------------
# They will be automatically populated by the runner. Users can optionally specify
# them to control the directory structure or for debugging.
run:
  root: outputs
  run_id: null
  dir: null
  # IANA timezone used for human-readable run IDs, metadata, and status files.
  # The code default is UTC; Harvard cluster logs use New York time here.
  timezone: America/New_York


# -----------------------------------------------------------------------------
# Runtime
# -----------------------------------------------------------------------------
runtime:
  seed: 0
  device: cpu
  dtype: float64


# -----------------------------------------------------------------------------
# Terminal logging
# -----------------------------------------------------------------------------
# Configures terminal UI
terminal:
  enabled: true
  level: info
  # `color`:
  #   auto   - use color when appropriate
  #   always - force ANSI color, including in SLURM logs
  #   never  - disable ANSI color
  color: auto
  rich: auto
  # `progress` should remain false for SLURM-compatible, line-oriented logs.
  progress: false


# -----------------------------------------------------------------------------
# Optional W&B dashboard tracking
# -----------------------------------------------------------------------------
#
# W&B is an optional dashboard/monitoring projection.
# Local CSV/JSONL logs and the run directory remain authoritative.
#
# Default policy:
#   - log scalar metrics
#   - log compact config/provenance metadata
#   - do not upload checkpoints, traces, or raw batches
#   - do not upload per-sample arrays
#
# To enable W&B:
#   1. Install optional W&B support.
#   2. Authenticate with `wandb login` or set `WANDB_API_KEY`.
#   3. Uncomment the WandB logger in the `loggers:` section at the bottom.
#
wandb:
  project: spenn-qmc-test
  entity: null
  # Use the SpENN run id as the W&B run name so dashboard runs map 1:1 to
  # local run directories. Populated by run setup before loggers instantiate.
  name: ${run.run_id}
  # online   - stream metrics to W&B
  # offline  - write locally and sync later with `wandb sync`
  # disabled - no-op, if supported by the logger
  mode: online
  group: ${experiment.name}
  job_type: eval
  tags:
    - hooke
    - smoke
    - eval
    - ${runtime.device}

  # W&B should mirror scalar metrics using the canonical namespace/key path:
  #   namespace = eval/sampler
  #   key       = acceptance_rate
  #   W&B name  = eval/sampler/acceptance_rate
  mirror_scalars: true

  # Add a small curated dashboard/* layer for easy visualization.
  dashboard_aliases: true

  # Add numeric health/* flags such as health/run_ok when derivable.
  health_flags: true

  # Keep artifact upload off by default. Checkpoints remain local.
  log_artifacts: false


# -----------------------------------------------------------------------------
# Physical system
# -----------------------------------------------------------------------------
system:
  name: hooke_pair
  n_particles: 2
  spatial_dim: 3
  omega: 0.5
  # to-be changed: spin can be free and optimized by runner
  spin:
    n_up: 1
    n_down: 1


# -----------------------------------------------------------------------------
# Reference values
# -----------------------------------------------------------------------------
# Reference energies belong in evaluation/reference context, never in `system`.
references:
  # Exact ground-state energy of the omega=0.5 Hooke singlet (Taut 1993).
  exact_energy: 2.0


# -----------------------------------------------------------------------------
# Model scale
# -----------------------------------------------------------------------------
model_params:
  # `max_order`:
  #   Maximum real feature body order used by the embedding/model.
  max_order: 2
  # `max_virtual_order`:
  #   Maximum virtual order used by equivariant mixing/path aggregation.
  max_virtual_order: 2
  # `channels`:
  #   Feature channel count throughout this model.
  channels: 4
  # `hidden_channels` and `num_hidden_layers`:
  #   Embedding MLP size.
  hidden_channels: 8
  num_hidden_layers: 1
  include_spins: true
  # `mixing_implementation`:
  #   SpENN supports multiple mixing implementations. This config uses the slow
  #   reference implementation to maximize test coverage.
  mixing_implementation: slow
  mixing_initial_weight: 0.5
  # Fixed Hooke Gaussian tail: exp(-(omega / 2) * sum_i |r_i|^2).
  harmonic_confinement_coefficient: 0.25


# -----------------------------------------------------------------------------
# Sampler scale
# -----------------------------------------------------------------------------
sampler_params:
  # `n_walkers`:
  #   Number of configurations sampled for evaluation.
  n_walkers: 32
  # `burn_in`:
  #   Number of initial MCMC updates before collecting samples.
  burn_in: 20
  # `n_steps`:
  #   Number of MCMC updates used between returned samples.
  n_steps: 5
  # `proposal_scale`:
  #   Gaussian proposal scale for Metropolis moves.
  proposal_scale: 0.5


# -----------------------------------------------------------------------------
# Evaluation
# -----------------------------------------------------------------------------
evaluation:
  return_terms: true # If true, compute/log named Hamiltonian term contributions.


# -----------------------------------------------------------------------------
# Timing
# -----------------------------------------------------------------------------
timing:
  # Set true on GPU runs for accurate timings; adds a small synchronization cost.
  cuda_synchronize: false


# =============================================================================
# Component specs: Hydra-instantiated objects
# =============================================================================

# -----------------------------------------------------------------------------
# Runner
# -----------------------------------------------------------------------------
#
# The runner owns the high-level lifecycle for this run.
#
# Evaluate samples once, evaluates the local energy, and feeds one shared
# EvaluationContext to every configured diagnostic. Diagnostics do not
# resample, log, or write artifacts themselves.
runner:
  _target_: spenn.runner.Evaluate
  model: ${model}
  sampler: ${sampler}
  hamiltonian_terms: ${hamiltonian_terms}
  return_terms: ${evaluation.return_terms}
  diagnostics:
    - _target_: spenn.diagnostics.EnergyEvaluation
      name: energy
      reference_energy: ${references.exact_energy}
      include_terms: true


# -----------------------------------------------------------------------------
# Model
# -----------------------------------------------------------------------------
#
# SpENNWaveFunction is the evaluated ansatz. This smoke config evaluates a
# freshly initialized model; benchmark evaluation configs should restore
# trained weights instead.
model:
  _target_: spenn.nn.SpENNWaveFunction
  trace_name: spenn # Name for traceable SpENN components.

  embedding:
    _target_: spenn.nn.Embedding
    max_order: ${model_params.max_order}
    spatial_dim: ${system.spatial_dim}
    out_channels: ${model_params.channels}
    hidden_channels: ${model_params.hidden_channels}
    num_hidden_layers: ${model_params.num_hidden_layers}
    include_spins: ${model_params.include_spins}

  layers:
    - _target_: spenn.nn.SpENNLayer

      mixing:
        _target_: spenn.nn.EquivariantMixing
        max_order: ${model_params.max_order}
        max_virtual_order: ${model_params.max_virtual_order}
        channels: ${model_params.channels}
        implementation: ${model_params.mixing_implementation}
        initial_weight: ${model_params.mixing_initial_weight}

      fourier:
        _target_: spenn.reps.FourierTransform

      activation:
        _target_: spenn.nn.GatedNormActivation
        gate:
          _target_: torch.nn.SiLU

      path_aggregation:
        _target_: spenn.nn.PathAggregation
        max_order: ${model_params.max_order}
        max_virtual_order: ${model_params.max_virtual_order}
        channels: ${model_params.channels}

      inverse_fourier:
        _target_: spenn.reps.InverseFourierTransform

      update:
        _target_: spenn.nn.ResidualUpdate

  envelope:
    _target_: spenn.nn.AdditiveEnvelope
    envelopes:
      - _target_: spenn.nn.HarmonicConfinement
        coefficient: ${model_params.harmonic_confinement_coefficient}
      - _target_: spenn.nn.ElectronElectronCusp

  readout:
    _target_: spenn.nn.readout.PfaffianReadout
    channels: ${model_params.channels}


# -----------------------------------------------------------------------------
# Hamiltonian
# -----------------------------------------------------------------------------
hamiltonian_terms:
  kinetic:
    _target_: spenn.physics.kinetic.KineticEnergy

  harmonic_trap:
    _target_: spenn.physics.potential.HarmonicTrap
    omega: ${system.omega}

  electron_electron:
    _target_: spenn.physics.potential.ElectronElectronInteraction


# -----------------------------------------------------------------------------
# Sampler
# -----------------------------------------------------------------------------
sampler:
  _target_: spenn.sampling.metropolis.MetropolisSampler
  n_walkers: ${sampler_params.n_walkers}
  burn_in: ${sampler_params.burn_in}
  n_steps: ${sampler_params.n_steps}
  proposal_scale: ${sampler_params.proposal_scale}
  seed: ${runtime.seed}

  n_electrons: ${system.n_particles}
  spatial_dim: ${system.spatial_dim}
  n_up: ${system.spin.n_up}
  n_down: ${system.spin.n_down}
  dtype: ${runtime.dtype}


# -----------------------------------------------------------------------------
# Callbacks
# -----------------------------------------------------------------------------
# Callbacks own lifecycle side effects, timing, and human-facing status.
#
# Loggers own persistent machine-readable metrics.
callbacks:
  # Save the authored config at run start.
  - _target_: spenn.callback.ConfigSnapshot
    triggers:
      - run_start
    output_path: ${run.dir}/config.yaml

  # Save the fully resolved config at run start.
  - _target_: spenn.callback.ResolvedConfigSnapshot
    triggers:
      - run_start
    output_path: ${run.dir}/resolved_config.yaml

  # Save run metadata, including start/end/failure lifecycle information.
  - _target_: spenn.callback.Metadata
    triggers:
      - run_start
      - run_end
      - exception
    output_path: ${run.dir}/metadata.json

  # Save compact lifecycle status and write the [eval] terminal summary line.
  - _target_: spenn.callback.Status
    triggers:
      - run_start
      - run_end
      - evaluate_end
      - exception
    output_path: ${run.dir}/status.json

  # Whole-run wall-clock timing: runtime/wall_time_sec and unix timestamps.
  - _target_: spenn.callback.RunTiming
    triggers:
      - run_start
      - run_end
      - exception
    cuda_synchronize: ${timing.cuda_synchronize}

  # Evaluation wall time: eval/perf/wall_time_sec.
  - _target_: spenn.callback.EvaluationTiming
    triggers:
      - evaluate_start
      - evaluate_end
      - exception
    cuda_synchronize: ${timing.cuda_synchronize}

  # Per-diagnostic durations: diagnostics/<name>/time_sec.
  - _target_: spenn.callback.DiagnosticTiming
    triggers:
      - diagnostic_start
      - diagnostic_end
      - diagnostic_failed
    cuda_synchronize: ${timing.cuda_synchronize}


# -----------------------------------------------------------------------------
# Loggers
# -----------------------------------------------------------------------------
# Local metrics are authoritative.
#
# CSV uses long-form scalar records:
#   step, namespace, key, value
#
# JSONL stores structured records for easier downstream parsing.
#
# W&B, when enabled, is only a dashboard projection of scalar metrics and compact
# provenance. It should not upload checkpoints/traces/raw batches by default.
loggers:
  - _target_: spenn.logging.CSV
    path: ${run.dir}/metrics.csv

  - _target_: spenn.logging.JSONL
    path: ${run.dir}/metrics.jsonl

  # Optional W&B dashboard logger.
  #
  # Uncomment this block only when optional W&B support is installed.
  #
  # - _target_: spenn.logging.WandB
  #   project: ${wandb.project}
  #   entity: ${wandb.entity}
  #   name: ${wandb.name}
  #   mode: ${wandb.mode}
  #   group: ${wandb.group}
  #   job_type: ${wandb.job_type}
  #   tags: ${wandb.tags}
  #   mirror_scalars: ${wandb.mirror_scalars}
  #   dashboard_aliases: ${wandb.dashboard_aliases}
  #   health_flags: ${wandb.health_flags}
  #   log_artifacts: ${wandb.log_artifacts}
  #   # Compact provenance mirrored into the W&B run config: links the dashboard
  #   # run back to the authoritative local run directory.
  #   config:
  #     run_id: ${run.run_id}
  #     run_dir: ${run.dir}
  #     experiment: ${experiment.name}
  #     sector: ${experiment.sector}
