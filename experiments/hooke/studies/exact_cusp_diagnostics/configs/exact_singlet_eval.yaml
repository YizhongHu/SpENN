# Exact Hooke singlet cusp diagnostics.
#
# This is a small, standalone evaluation run for the analytic omega=0.5
# two-electron Hooke singlet. It samples the exact wavefunction, logs local
# energy diagnostics, and writes a deterministic pair-distance probe used by
# plot_pair_distance.py.

experiment:
  name: exact_cusp_diagnostics
  sector: singlet
  run_name: exact_cusp_diagnostics_eval

run:
  root: outputs
  run_id: null
  dir: null
  timezone: America/New_York

runtime:
  seed: 0
  device: cpu
  dtype: float64

terminal:
  enabled: true
  level: info
  color: auto
  rich: auto
  progress: false

system:
  name: hooke_pair_singlet
  n_particles: 2
  spatial_dim: 3
  omega: 0.5
  spin:
    n_up: 1
    n_down: 1

references:
  exact_energy: 2.0

sampler_params:
  n_walkers: 256
  burn_in: 100
  n_steps: 50
  proposal_scale: 0.5

diagnostic_params:
  quantiles: [0.001, 0.01, 0.05, 0.5, 0.95, 0.99, 0.999]
  pair_distance_probe:
    r12_min: 1.0e-4
    r12_max: 8.0
    n_points: 160
    n_directions: 1
    center_of_mass_radii: [0.0]
    include_exact_wavefunction: true
    local_energy_chunk_size: 256

evaluation:
  namespace: eval
  seed: ${runtime.seed}
  artifact_level: summaries
  task_failure_policy: continue
  return_terms: true

timing:
  cuda_synchronize: false

runner:
  _target_: spenn.runner.Evaluate
  model: ${model}
  evaluator: ${evaluator}

evaluator:
  _target_: spenn.evaluation.Evaluator
  namespace: ${evaluation.namespace}
  seed: ${evaluation.seed}
  artifact_level: ${evaluation.artifact_level}
  task_failure_policy: ${evaluation.task_failure_policy}
  tasks:
    - ${evaluation_tasks.energy}
    - ${evaluation_tasks.cusp}

evaluation_tasks:
  energy:
    name: energy
    namespace: ${evaluation.namespace}/energy
    generator:
      _target_: spenn.evaluation.generators.MCMCGenerator
      sampler: ${sampler}
      seed: ${evaluation.seed}
    calculators:
      - _target_: spenn.evaluation.calculators.WavefunctionCalculator
      - _target_: spenn.evaluation.calculators.LocalEnergyCalculator
        hamiltonian_terms: ${hamiltonian_terms}
        return_terms: ${evaluation.return_terms}
    summaries:
      - _target_: spenn.evaluation.summaries.LocalEnergySummary
        quantiles: ${diagnostic_params.quantiles}
      - _target_: spenn.evaluation.summaries.HamiltonianTermSummary
      - _target_: spenn.evaluation.summaries.SamplerStatsSummary
      - _target_: spenn.evaluation.summaries.ReferenceEnergySummary
        reference_energy: ${references.exact_energy}

  cusp:
    name: cusp
    namespace: ${evaluation.namespace}/cusp
    generator:
      _target_: spenn.evaluation.generators.CuspGridGenerator
      r12_min: ${diagnostic_params.pair_distance_probe.r12_min}
      r12_max: ${diagnostic_params.pair_distance_probe.r12_max}
      n_points: ${diagnostic_params.pair_distance_probe.n_points}
      n_directions: ${diagnostic_params.pair_distance_probe.n_directions}
      center_of_mass_radii: ${diagnostic_params.pair_distance_probe.center_of_mass_radii}
      paired_directions: true
      spin_pair: opposite
      seed: ${evaluation.seed}
    calculators:
      - _target_: spenn.evaluation.calculators.LocalEnergyCalculator
        hamiltonian_terms: ${hamiltonian_terms}
        return_terms: false
        chunk_size: ${diagnostic_params.pair_distance_probe.local_energy_chunk_size}
      - _target_: spenn.evaluation.calculators.RadialLogAbsDerivativeCalculator
        chunk_size: ${diagnostic_params.pair_distance_probe.local_energy_chunk_size}
    summaries:
      - _target_: spenn.evaluation.summaries.CoalescenceDivergenceSummary
      - _target_: spenn.evaluation.summaries.OppositeSpinCuspSummary
      - _target_: spenn.evaluation.summaries.PathologyCountSummary

model:
  _target_: spenn.physics.hooke.HookeSingletExact

hamiltonian_terms:
  kinetic:
    _target_: spenn.physics.kinetic.KineticEnergy

  harmonic_trap:
    _target_: spenn.physics.potential.HarmonicTrap
    omega: ${system.omega}

  electron_electron:
    _target_: spenn.physics.potential.ElectronElectronInteraction

sampler:
  _target_: spenn.sampling.metropolis.MetropolisSampler
  n_walkers: ${sampler_params.n_walkers}
  burn_in: ${sampler_params.burn_in}
  n_steps: ${sampler_params.n_steps}
  proposal_scale: ${sampler_params.proposal_scale}
  seed: ${runtime.seed}

  n_electrons: ${system.n_particles}
  spatial_dim: ${system.spatial_dim}
  n_up: ${system.spin.n_up}
  n_down: ${system.spin.n_down}
  dtype: ${runtime.dtype}

callbacks:
  - _target_: spenn.callback.ConfigSnapshot
    triggers:
      - run_start
    output_path: ${run.dir}/config.yaml

  - _target_: spenn.callback.ResolvedConfigSnapshot
    triggers:
      - run_start
    output_path: ${run.dir}/resolved_config.yaml

  - _target_: spenn.callback.Metadata
    triggers:
      - run_start
      - run_end
      - exception
    output_path: ${run.dir}/metadata.json

  - _target_: spenn.callback.Status
    triggers:
      - run_start
      - run_end
      - evaluate_end
      - exception
    output_path: ${run.dir}/status.json

  - _target_: spenn.callback.RunTiming
    triggers:
      - run_start
      - run_end
      - exception
    cuda_synchronize: ${timing.cuda_synchronize}

  - _target_: spenn.callback.EvaluationTiming
    triggers:
      - evaluate_start
      - evaluate_end
      - exception
    cuda_synchronize: ${timing.cuda_synchronize}

  - _target_: spenn.callback.DiagnosticTiming
    triggers:
      - diagnostic_start
      - diagnostic_end
      - diagnostic_failed
      - task_start
      - task_end
      - task_failed
    cuda_synchronize: ${timing.cuda_synchronize}

  - _target_: spenn.callback.ArtifactIndex

  - _target_: spenn.callback.FailureLog

loggers:
  - _target_: spenn.logging.CSV
    path: ${run.dir}/metrics.csv

  - _target_: spenn.logging.JSONL
    path: ${run.dir}/metrics.jsonl
