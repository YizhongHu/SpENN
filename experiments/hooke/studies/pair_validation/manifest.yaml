# =============================================================================
# Hooke pair validation study manifest (protocol contract)
# =============================================================================
#
# This manifest declares the PR8.1 validation-scan protocol: the grid and the
# durable checkpoint/run-artifact policy. Selection and final-evaluation
# orchestration are deferred to PR8.2 and should consume the local artifacts
# written by these runs.

study:
  name: hooke_pair_validation_v1
  purpose: validation_scan
  sector: singlet

# Base training config expanded by the launcher (one run per grid point).
train_config: experiments/hooke/configs/benchmark/pair_train.yaml

# Grid axes are resolved-config keys (OmegaConf dotted paths).
grid:
  runtime.seed: [3, 9, 11]
  optimizer_params.lr: [3.0e-4, 1.0e-3, 3.0e-3]
  model_params.channels: [8, 32, 128]
  model_params.layers: [1]
  model_params.gate_activation: [silu, sigmoid]

# Grid key holding the replicate seed; all other grid keys define a config
# group for selection.
seed_key: runtime.seed

validation:
  namespace: validation
  sampler_namespace: validation/sampler
  exact_reference_energy_allowed: false

checkpoint_artifacts:
  schema_version: 1
  restore_modes: [none, model_only, train_resume]
  directory_layout: true
  require_complete_marker: true
  latest_pointer: latest.json
  save_model_state_dict: true
  save_optimizer_state_dict: true
  save_trainer_state: true
  save_sampler_mcmc_state: true
  save_rng_state: true

run_durability:
  write_run_start_json: true
  environment_policy: allowlist
  keep_slurm_logs: true
