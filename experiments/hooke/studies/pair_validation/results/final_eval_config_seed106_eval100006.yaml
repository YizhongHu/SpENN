experiment:
  name: hooke_pair_benchmark
  sector: pair
  run_name: hooke_pair_benchmark_final_eval
study:
  name: hooke_pair_final_v1
  config_id: lr=0.001_channels=32_layers=1_gate_activation=sigmoid
run:
  root: outputs/hooke_pair_final_v1
  run_id: final_eval_seed106_eval100006
  dir: null
  timezone: America/New_York
runtime:
  seed: 100006
  device: cuda
  dtype: float64
terminal:
  enabled: true
  level: info
  color: auto
  rich: auto
  progress: false
wandb:
  project: SpENN-QMC
  entity: null
  name: ${run.run_id}
  mode: online
  group: hooke_pair_final_v1
  job_type: eval
  tags:
  - hooke-pair
  - ${runtime.device}
  - final-eval
  mirror_scalars: true
  dashboard_aliases: true
  health_flags: true
  log_artifacts: false
system:
  name: hooke_pair
  n_particles: 2
  spatial_dim: 3
  omega: 0.5
  spin:
    n_up: 1
    n_down: 1
references:
  exact_energy: 2.0
gate_targets:
  silu: torch.nn.SiLU
  sigmoid: torch.nn.Sigmoid
model_params:
  max_order: 2
  max_virtual_order: 2
  channels: 32
  hidden_channels: 16
  num_hidden_layers: 1
  layers: 1
  gate_activation: sigmoid
  include_spins: true
  mixing_implementation: vectorized
  mixing_initial_weight: 0.5
  harmonic_confinement_coefficient: 0.25
sampler_params:
  n_walkers: 8192
  burn_in: 1000
  n_steps: 500
  proposal_scale: 0.35
evaluation:
  checkpoint: outputs/hooke_pair_final_v1/hooke_pair_benchmark/pair/final_train_seed106/checkpoints/latest.pt
  checkpoint_strict: true
  expected_model_config_hash: 2516ea28271e647f3e60fe3ca9fc2eae7881d6c7cc72e56b1937015092cc7d59
  allow_model_config_mismatch: false
  training_seed: 106
  return_terms: true
timing:
  cuda_synchronize: false
runner:
  _target_: spenn.runner.Evaluate
  model:
    _target_: spenn.callback.checkpoint.load_model_checkpoint
    model: ${model}
    path: ${evaluation.checkpoint}
    strict: ${evaluation.checkpoint_strict}
    expected_model_config_hash: ${evaluation.expected_model_config_hash}
    allow_model_config_mismatch: ${evaluation.allow_model_config_mismatch}
  sampler: ${sampler}
  hamiltonian_terms: ${hamiltonian_terms}
  return_terms: ${evaluation.return_terms}
  diagnostics:
  - _target_: spenn.diagnostics.EnergyEvaluation
    name: energy
    reference_energy: ${references.exact_energy}
    include_terms: true
model:
  _target_: spenn.nn.SpENNWaveFunction
  trace_name: spenn
  embedding:
    _target_: spenn.nn.Embedding
    max_order: 2
    spatial_dim: 3
    out_channels: 32
    hidden_channels: 16
    num_hidden_layers: 1
    include_spins: true
  layers:
  - _target_: spenn.nn.SpENNLayer
    mixing:
      _target_: spenn.nn.EquivariantMixing
      max_order: 2
      max_virtual_order: 2
      channels: 32
      implementation: vectorized
      initial_weight: 0.5
    fourier:
      _target_: spenn.reps.FourierTransform
    activation:
      _target_: spenn.nn.GatedNormActivation
      gate:
        _target_: torch.nn.Sigmoid
    path_aggregation:
      _target_: spenn.nn.PathAggregation
      max_order: 2
      max_virtual_order: 2
      channels: 32
    inverse_fourier:
      _target_: spenn.reps.InverseFourierTransform
    update:
      _target_: spenn.nn.ResidualUpdate
  envelope:
    _target_: spenn.nn.AdditiveEnvelope
    envelopes:
    - _target_: spenn.nn.HarmonicConfinement
      coefficient: 0.25
    - _target_: spenn.nn.ElectronElectronCusp
  readout:
    _target_: spenn.nn.readout.PfaffianReadout
    channels: 32
hamiltonian_terms:
  kinetic:
    _target_: spenn.physics.kinetic.KineticEnergy
  harmonic_trap:
    _target_: spenn.physics.potential.HarmonicTrap
    omega: ${system.omega}
  electron_electron:
    _target_: spenn.physics.potential.ElectronElectronInteraction
sampler:
  _target_: spenn.sampling.metropolis.MetropolisSampler
  n_walkers: ${sampler_params.n_walkers}
  burn_in: ${sampler_params.burn_in}
  n_steps: ${sampler_params.n_steps}
  proposal_scale: ${sampler_params.proposal_scale}
  seed: ${runtime.seed}
  n_electrons: ${system.n_particles}
  spatial_dim: ${system.spatial_dim}
  n_up: ${system.spin.n_up}
  n_down: ${system.spin.n_down}
  dtype: ${runtime.dtype}
callbacks:
- _target_: spenn.callback.ConfigSnapshot
  triggers:
  - run_start
  output_path: ${run.dir}/config.yaml
- _target_: spenn.callback.ResolvedConfigSnapshot
  triggers:
  - run_start
  output_path: ${run.dir}/resolved_config.yaml
- _target_: spenn.callback.Metadata
  triggers:
  - run_start
  - run_end
  - exception
  output_path: ${run.dir}/metadata.json
- _target_: spenn.callback.Status
  triggers:
  - run_start
  - run_end
  - evaluate_end
  - exception
  output_path: ${run.dir}/status.json
- _target_: spenn.callback.RunTiming
  triggers:
  - run_start
  - run_end
  - exception
  cuda_synchronize: ${timing.cuda_synchronize}
- _target_: spenn.callback.EvaluationTiming
  triggers:
  - evaluate_start
  - evaluate_end
  - exception
  cuda_synchronize: ${timing.cuda_synchronize}
- _target_: spenn.callback.DiagnosticTiming
  triggers:
  - diagnostic_start
  - diagnostic_end
  - diagnostic_failed
  cuda_synchronize: ${timing.cuda_synchronize}
loggers:
- _target_: spenn.logging.CSV
  path: ${run.dir}/metrics.csv
- _target_: spenn.logging.JSONL
  path: ${run.dir}/metrics.jsonl
checkpoint_loading:
  mode: structured_checkpoint
  source_resolved_config: null
  checkpoint_path: outputs/hooke_pair_final_v1/hooke_pair_benchmark/pair/final_train_seed106/checkpoints/latest.pt
  strict: true
  model_config_hash_verified: true
